<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVA - Engineering Variance Authority</title>
  
  <!-- Shortcut Icons & PWA Manifest for Desktop/Mobile Installation -->
  <link rel="icon" type="image/png" href="EVAA.png">
  <link rel="shortcut icon" href="EVAA.png" type="image/x-icon">
  <link rel="apple-touch-icon" href="EVAA.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EVA">
  <meta name="application-name" content="EVA">
  <meta name="theme-color" content="#2d2d2d">
  
  <!-- Embedded Manifest for full "Create Shortcut" support -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Ascend%20Engineering%20Matrix%22%2C%22short_name%22%3A%22Ascend%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22theme_color%22%3A%22%232d2d2d%22%2C%22background_color%22%3A%22%23e8e6df%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22EVAA.png%22%2C%22sizes%22%3A%22192x192%20512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
  
  <!-- Configure Tailwind to ignore sticky hovers on touch devices -->
  <script>
    tailwind = {
      config: {
        future: {
          hoverOnlyWhenSupported: true,
        }
      }
    }
  </script>

  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for translating JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useReducer, createContext, useContext, useRef } = React;

    // --- Global State & Persistence ---
    const DEFAULT_STATE = {
      tasks: [
        { id: 1, title: "Debug Java Thread Sync", weight: 8, status: "todo", epic: "Hotel Mgmt", isToday: true, syllabusId: null },
        { id: 2, title: "Draft Conic Sections", weight: 3, status: "todo", epic: "Math 301", isToday: false, syllabusId: 1 },
        { id: 3, title: "Wire 3-bit Adder", weight: 9, status: "done", epic: "Digital Logic", isToday: true, syllabusId: 2 }
      ],
      inventory: [
        { id: 1, name: "Breadboard (Large)", category: "Board", quantity: 2, minStock: 1, specs: "830 Tie Points" },
        { id: 2, name: "74HC08 Quad AND", category: "IC", quantity: 5, minStock: 10, specs: "DIP-14" },
        { id: 3, name: "Jumper Wires (M-M)", category: "Wire", quantity: 45, minStock: 20, specs: "Assorted Lengths" }
      ],
      syllabus: [
        { id: 1, course: "MTH 301", deliverable: "Conic Sections Presentation", deadline: "2026-05-20", type: "Presentation", status: "active" },
        { id: 2, course: "ENG 202", deliverable: "3-Bit Signed Calculator", deadline: "2026-06-01", type: "Lab Build", status: "active" }
      ],
      formulas: [
        { id: 1, title: "Euler's Identity", code: "e^(i*pi) + 1 = 0", tags: "Equation" },
        { id: 2, title: "Ohm's Law", code: "V = I * R", tags: "Equation" }
      ],
      truthTables: [],
      incidents: [
        { id: 1, title: "NullPointerException in AuthModule", description: "Socket connection drops unexpectedly during payload transfer.", status: "active", steps: [{id: 101, text: "Isolate packet header", done: true}, {id: 102, text: "Verify token sync", done: false}] },
        { id: 2, title: "VCC Short to Ground", description: "Breadboard rail overheating near 74HC08.", status: "pruned", steps: [{id: 201, text: "Check IC orientation", done: true}, {id: 202, text: "Meter continuity", done: true}] }
      ],
      stats: { clearancePoints: 0, efficiencyYield: 100 },
      settings: { scanlinesEnabled: true, userDesignation: "ENGINEER", envName: "LOCAL_DEV", theme: "light", focusDuration: 25, autoPrune: false, accentColor: "orange" }
    };

    function matrixReducer(state, action) {
      switch (action.type) {
        case 'ADD_TASK': return { ...state, tasks: [...(state.tasks || []), action.payload] };
        case 'UPDATE_TASK': return { ...state, tasks: (state.tasks || []).map(t => t.id === action.payload.id ? { ...t, ...action.payload } : t) };
        case 'TOGGLE_TASK_STATUS': {
          const updatedTasks = (state.tasks || []).map(t => t.id === action.payload ? { ...t, status: t.status === 'todo' ? 'done' : 'todo' } : t);
          if (state.settings?.autoPrune) {
             return { ...state, tasks: updatedTasks.filter(t => t.status !== 'done') };
          }
          return { ...state, tasks: updatedTasks };
        }
        case 'TOGGLE_TASK_TODAY': return { ...state, tasks: (state.tasks || []).map(t => t.id === action.payload ? { ...t, isToday: !t.isToday } : t) };
        case 'DELETE_TASK': return { ...state, tasks: (state.tasks || []).filter(t => t.id !== action.payload) };
        case 'PRUNE_COMPLETED_TASKS': return { ...state, tasks: (state.tasks || []).filter(t => t.status !== 'done') };
        case 'PURGE_INCIDENTS': return { ...state, incidents: [] };
        case 'PURGE_INVENTORY': return { ...state, inventory: [] };
        case 'ADD_INVENTORY': return { ...state, inventory: [...(state.inventory || []), action.payload] };
        case 'UPDATE_INVENTORY': return { ...state, inventory: (state.inventory || []).map(i => i.id === action.payload.id ? { ...i, ...action.payload } : i) };
        case 'DELETE_INVENTORY': return { ...state, inventory: (state.inventory || []).filter(i => i.id !== action.payload) };
        case 'ADD_SYLLABUS': return { ...state, syllabus: [...(state.syllabus || []), action.payload] };
        case 'DELETE_SYLLABUS': {
          const untetheredTasks = (state.tasks || []).map(t => t.syllabusId === action.payload ? { ...t, syllabusId: null } : t);
          return { ...state, syllabus: (state.syllabus || []).filter(s => s.id !== action.payload), tasks: untetheredTasks };
        }
        case 'SPAWN_EPIC': return { ...state, tasks: [...(state.tasks || []), ...action.payload] };
        case 'SAVE_TRUTH_TABLE': return { ...state, truthTables: [...(state.truthTables || []), action.payload] };
        case 'DELETE_TRUTH_TABLE': return { ...state, truthTables: (state.truthTables || []).filter(tt => tt.id !== action.payload) };
        case 'ADD_FORMULA': return { ...state, formulas: [...(state.formulas || []), action.payload] };
        case 'DELETE_FORMULA': return { ...state, formulas: (state.formulas || []).filter(f => f.id !== action.payload) };
        case 'ADD_INCIDENT': return { ...state, incidents: [...(state.incidents || []), action.payload] };
        case 'DELETE_INCIDENT': return { ...state, incidents: (state.incidents || []).filter(i => i.id !== action.payload) };
        case 'PRUNE_INCIDENT': return { ...state, incidents: (state.incidents || []).map(i => i.id === action.payload ? { ...i, status: 'pruned' } : i) };
        case 'ADD_INCIDENT_STEP': return { ...state, incidents: (state.incidents || []).map(i => i.id === action.payload.incidentId ? { ...i, steps: [...(i.steps || []), action.payload.step] } : i) };
        case 'TOGGLE_INCIDENT_STEP': return { ...state, incidents: (state.incidents || []).map(i => i.id === action.payload.incidentId ? { ...i, steps: (i.steps || []).map(s => s.id === action.payload.stepId ? { ...s, done: !s.done } : s) } : i) };
        case 'ADD_CLEARANCE_POINTS': return { ...state, stats: { ...(state.stats || {}), clearancePoints: ((state.stats || {}).clearancePoints || 0) + action.payload } };
        case 'UPDATE_SETTINGS': return { ...state, settings: { ...(state.settings || {}), ...action.payload } };
        case 'RESET_TIMELINE': return { ...DEFAULT_STATE };
        case 'IMPORT_STATE': {
          const loaded = action.payload || {};
          return {
            ...DEFAULT_STATE,
            ...loaded,
            tasks: loaded.tasks || DEFAULT_STATE.tasks,
            inventory: loaded.inventory || DEFAULT_STATE.inventory,
            syllabus: loaded.syllabus || DEFAULT_STATE.syllabus,
            formulas: loaded.formulas || DEFAULT_STATE.formulas,
            truthTables: loaded.truthTables || DEFAULT_STATE.truthTables,
            incidents: loaded.incidents || DEFAULT_STATE.incidents,
            stats: loaded.stats || DEFAULT_STATE.stats,
            settings: loaded.settings || DEFAULT_STATE.settings
          };
        }
        default: return state;
      }
    }

    const MatrixContext = createContext();
    const ToastContext = createContext();

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);

      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };

      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 flex flex-col gap-3 pointer-events-none max-w-[calc(100vw-2rem)]">
            {toasts.map(t => (
              <div key={t.id} className="panel border-stamped p-3 sm:p-4 flex items-center gap-3 animate-in fade-in slide-in-from-right-5 bg-[var(--card)] pointer-events-auto" style={{ minWidth: 'min(320px, 100%)' }}>
                <div className={`status-dot shrink-0 ${t.type === 'warning' || t.type === 'success' ? 'blink' : ''}`} style={{ background: t.type === 'warning' ? 'var(--stamp)' : 'var(--ink)' }}></div>
                <span className="label !mb-0 text-[10px] sm:text-sm tracking-widest leading-tight" style={{ color: t.type === 'warning' ? 'var(--stamp)' : 'var(--ink)' }}>
                  {t.type === 'warning' ? '⚠ WARNING' : t.type === 'success' ? '✓ LOGGED' : '◆ NOTICE'}: {t.message}
                </span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    // ----------------------------------------------------
    // LEFT SIDEBAR SETTINGS MODAL COMPONENT
    // ----------------------------------------------------
    const SettingsModal = ({ isOpen, onClose }) => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);

      if (!isOpen) return null;

      const handleExport = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "eva_timeline_export.json");
        dlAnchorElem.click();
        toast('TIMELINE DATA EXPORTED.', 'success');
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = JSON.parse(e.target.result);
            dispatch({ type: 'IMPORT_STATE', payload: parsed });
            toast('TIMELINE DATA IMPORTED.', 'success');
            onClose();
          } catch (err) {
            toast('CORRUPT DATA FRAGMENT. IMPORT FAILED.', 'warning');
          }
        };
        reader.readAsText(file);
      };

      const handleReset = () => {
        if (window.confirm("⚠ WARNING: THIS WILL PRUNE YOUR ENTIRE TIMELINE RECORD. PROCEED?")) {
           dispatch({ type: 'RESET_TIMELINE' });
           toast('TIMELINE PRUNED. DEFAULT STATE RESTORED.', 'warning');
           onClose();
        }
      };

      const handlePruneCompletedTasks = () => {
        if (window.confirm("⚠ PRUNE ALL COMPLETED DIRECTIVES FROM THE MATRIX?")) {
           dispatch({ type: 'PRUNE_COMPLETED_TASKS' });
           toast('COMPLETED TASKS PURGED.', 'success');
        }
      };

      const toggleSetting = (key) => {
        const current = state.settings?.[key] !== false;
        dispatch({ type: 'UPDATE_SETTINGS', payload: { [key]: !current } });
      };

      const toggleTheme = () => {
        const currentTheme = state.settings?.theme || 'light';
        dispatch({ type: 'UPDATE_SETTINGS', payload: { theme: currentTheme === 'light' ? 'dark' : 'light' } });
      };

      const scanlinesOn = state.settings?.scanlinesEnabled !== false;
      const isDark = state.settings?.theme === 'dark';
      const autoPrune = state.settings?.autoPrune === true;

      const changeAccent = (color) => dispatch({ type: 'UPDATE_SETTINGS', payload: { accentColor: color } });

      return (
        <div className="fixed inset-0 z-[100] flex bg-black/60 backdrop-blur-sm p-0">
           <div className="panel bg-[var(--paper)] w-full sm:w-80 h-full !border-y-0 !border-l-0 border-r-2 border-[var(--ink)] shadow-[4px_0_0_0_var(--stamp)] flex flex-col animate-in slide-in-from-left duration-300">
             <div className="head bg-[var(--card)] shrink-0 py-5">
               <span className="font-bold text-[var(--stamp)]">SYSTEM CONFIGURATION</span>
               <button onClick={onClose} className="btn-ghost !text-[var(--rust)] !text-xl px-2">✕</button>
             </div>
             
             <div className="body flex flex-col gap-8 p-6 overflow-y-auto custom-scrollbar flex-1">
                
                {/* IDENTITY SECTION */}
                <div className="flex flex-col gap-4">
                  <div className="flex flex-col gap-2">
                    <label className="label !mb-0 text-[10px] sm:text-xs">USER DESIGNATION</label>
                    <input type="text" placeholder="E.G. ENGINEER, MINUTEMAN" className="input w-full" value={state.settings?.userDesignation || ''} onChange={e => dispatch({ type: 'UPDATE_SETTINGS', payload: { userDesignation: e.target.value.toUpperCase() }})} />
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="label !mb-0 text-[10px] sm:text-xs">ENVIRONMENT LABEL</label>
                    <input type="text" placeholder="E.G. LOCAL_DEV" className="input w-full" value={state.settings?.envName || ''} onChange={e => dispatch({ type: 'UPDATE_SETTINGS', payload: { envName: e.target.value.toUpperCase() }})} />
                  </div>
                </div>

                {/* VISUAL PROTOCOLS SECTION */}
                <div className="flex flex-col gap-6 border-y border-dashed border-[var(--ink)] py-8 px-1 my-2">
                  <div className="flex items-center justify-between">
                    <span className="label !mb-0 text-[10px] sm:text-xs">DARK PROTOCOL</span>
                    <button onClick={toggleTheme} className={`btn-square w-12 h-6 flex items-center p-1 rounded-full transition-colors ${isDark ? 'bg-[var(--stamp)] !border-[var(--stamp)]' : 'bg-[var(--card)]'}`}>
                       <div className={`w-4 h-4 rounded-full bg-[var(--paper)] transition-transform duration-200 ${isDark ? 'translate-x-5' : 'translate-x-0'}`}></div>
                    </button>
                  </div>
                  <div className="flex items-center justify-between mt-2">
                    <span className="label !mb-0 text-[10px] sm:text-xs">CRT SCANLINES</span>
                    <button onClick={() => toggleSetting('scanlinesEnabled')} className={`btn-square w-12 h-6 flex items-center p-1 rounded-full transition-colors ${scanlinesOn ? 'bg-[var(--stamp)] !border-[var(--stamp)]' : 'bg-[var(--card)]'}`}>
                       <div className={`w-4 h-4 rounded-full bg-[var(--paper)] transition-transform duration-200 ${scanlinesOn ? 'translate-x-5' : 'translate-x-0'}`}></div>
                    </button>
                  </div>
                  
                  <div className="flex flex-col gap-2 mt-4">
                    <span className="font-sans text-[11px] sm:text-[13px] uppercase font-bold opacity-70">PHOSPHOR ACCENT</span>
                    <div className="flex gap-2 mt-1">
                      <button onClick={() => changeAccent('orange')} className={`w-8 h-8 rounded-full border-2 ${state.settings?.accentColor === 'orange' || !state.settings?.accentColor ? 'border-[var(--ink)] scale-110 shadow-[2px_2px_0_0_var(--ink)]' : 'border-transparent opacity-60 hover:opacity-100'} bg-[#db5b24] transition-all`}></button>
                      <button onClick={() => changeAccent('cyan')} className={`w-8 h-8 rounded-full border-2 ${state.settings?.accentColor === 'cyan' ? 'border-[var(--ink)] scale-110 shadow-[2px_2px_0_0_var(--ink)]' : 'border-transparent opacity-60 hover:opacity-100'} bg-[#0ea5e9] transition-all`}></button>
                      <button onClick={() => changeAccent('green')} className={`w-8 h-8 rounded-full border-2 ${state.settings?.accentColor === 'green' ? 'border-[var(--ink)] scale-110 shadow-[2px_2px_0_0_var(--ink)]' : 'border-transparent opacity-60 hover:opacity-100'} bg-[#16a34a] transition-all`}></button>
                      <button onClick={() => changeAccent('magenta')} className={`w-8 h-8 rounded-full border-2 ${state.settings?.accentColor === 'magenta' ? 'border-[var(--ink)] scale-110 shadow-[2px_2px_0_0_var(--ink)]' : 'border-transparent opacity-60 hover:opacity-100'} bg-[#d946ef] transition-all`}></button>
                    </div>
                  </div>
                </div>

                {/* WORKFLOW AUTOMATION SECTION */}
                <div className="flex flex-col gap-5 border-b border-dashed border-[var(--ink)] pb-8 px-1 mb-4">
                  <span className="label !mb-1 text-[10px] sm:text-xs pt-1">WORKFLOW AUTOMATION</span>
                  <div className="flex flex-col gap-3">
                    <label className="label !mb-1 text-[9px] sm:text-[10px] opacity-70">CHRONO-MONITOR DURATION (MINUTES)</label>
                    <div className="flex gap-2">
                      {[15, 25, 45, 60].map(mins => (
                        <button 
                          key={mins}
                          onClick={() => dispatch({ type: 'UPDATE_SETTINGS', payload: { focusDuration: mins }})}
                          className={`btn-square flex-1 h-8 text-[11px] font-bold ${state.settings?.focusDuration === mins || (!state.settings?.focusDuration && mins === 25) ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--paper)] text-[var(--ink)]'}`}
                        >
                          {mins}
                        </button>
                      ))}
                    </div>
                    <input 
                       type="number" 
                       min="1" max="240"
                       placeholder="CUSTOM (MINS)"
                       className="input w-full mt-1" 
                       value={state.settings?.focusDuration || 25} 
                       onChange={e => dispatch({ type: 'UPDATE_SETTINGS', payload: { focusDuration: parseInt(e.target.value) || 25 }})} 
                    />
                  </div>

                  <div className="flex items-center justify-between mt-4">
                    <span className="text-[11px] sm:text-[13px] uppercase font-bold text-[var(--ink)] w-3/4 leading-snug">AUTO-PRUNE COMPLETED DIRECTIVES</span>
                    <button onClick={() => toggleSetting('autoPrune')} className={`btn-square w-12 h-6 flex items-center p-1 rounded-full transition-colors ${autoPrune ? 'bg-[var(--stamp)] !border-[var(--stamp)]' : 'bg-[var(--card)]'}`}>
                       <div className={`w-4 h-4 rounded-full bg-[var(--paper)] transition-transform duration-200 ${autoPrune ? 'translate-x-5' : 'translate-x-0'}`}></div>
                    </button>
                  </div>
                </div>

                {/* DATA MANAGEMENT SECTION */}
                <div className="flex flex-col gap-3 pt-2">
                  <span className="label !mb-0 text-[10px] sm:text-xs">DATA MANAGEMENT</span>
                  <div className="flex gap-3">
                    <button onClick={handleExport} className="btn-outline flex-1 !text-[10px] sm:!text-xs !py-3">EXPORT ↳</button>
                    <label className="btn-outline flex-1 !text-[10px] sm:!text-xs !py-3 text-center cursor-pointer">
                      IMPORT ↰
                      <input type="file" accept=".json" className="hidden" onChange={handleImport} />
                    </label>
                  </div>
                  
                  <div className="flex flex-col gap-3 mt-4">
                    <span className="text-[10px] sm:text-[11px] uppercase tracking-widest font-bold opacity-70 text-[var(--destructive)]">DANGER ZONE</span>
                    <div className="grid grid-cols-2 gap-3">
                      <button onClick={() => { if(window.confirm("PURGE ALL INCIDENTS?")) { dispatch({ type: 'PURGE_INCIDENTS' }); toast('INCIDENTS PURGED.', 'warning'); } }} className="btn-outline !border-[var(--destructive)] !text-[var(--destructive)] hover:!bg-[var(--destructive)] hover:!text-[var(--paper)] !text-[9px] !py-3">
                        PURGE INCIDENTS
                      </button>
                      <button onClick={() => { if(window.confirm("PURGE ALL INVENTORY?")) { dispatch({ type: 'PURGE_INVENTORY' }); toast('INVENTORY PURGED.', 'warning'); } }} className="btn-outline !border-[var(--destructive)] !text-[var(--destructive)] hover:!bg-[var(--destructive)] hover:!text-[var(--paper)] !text-[9px] !py-3">
                        PURGE INVENTORY
                      </button>
                    </div>
                    <button onClick={handlePruneCompletedTasks} className="btn-outline !border-[var(--stamp)] !text-[var(--stamp)] hover:!bg-[var(--stamp)] hover:!text-[var(--paper)] !text-[10px] sm:!text-xs !py-3 w-full">
                      PRUNE COMPLETED TASKS
                    </button>
                    <button onClick={handleReset} className="btn-outline !border-[var(--destructive)] !bg-[var(--destructive)] !text-[var(--paper)] hover:opacity-80 !text-[10px] sm:!text-xs !py-3 w-full">
                      ⚠ INITIATE FULL SYSTEM RESET
                    </button>
                  </div>
                </div>

             </div>
           </div>
        </div>
      );
    }

    // ----------------------------------------------------
    // THE TEMPORAL LOOM (BRANCHING EDITION)
    // ----------------------------------------------------
    const TemporalLoom = () => {
      const { state, dispatch } = useContext(MatrixContext);
      
      const timelineNodes = [];
      const deadlines = [...new Set((state.syllabus || []).filter(s => s.deadline).map(s => s.deadline))].sort();

      deadlines.forEach(date => {
        const coursesDue = (state.syllabus || []).filter(s => s.deadline === date);
        let highComplexityTasks = 0;
        let totalLoad = 0;

        const coursesWithTasks = coursesDue.map(course => {
          const linked = (state.tasks || []).filter(t => t.syllabusId === course.id);
          totalLoad += linked.reduce((sum, t) => sum + t.weight, 0);
          highComplexityTasks += linked.filter(t => t.weight >= 8).length;
          return { ...course, linkedTasks: linked };
        });

        const isCollision = highComplexityTasks >= 3;
        timelineNodes.push({ date, courses: coursesWithTasks, highComplexityTasks, totalLoad, isCollision });
      });

      const TIMELINE_Y = 250;
      const NODE_SPACING = 340;

      const nodesLayout = timelineNodes.map((node, i) => {
        const x = 160 + i * NODE_SPACING;
        const y = TIMELINE_Y + (i % 2 === 0 ? -30 : 30);
        
        const allTasks = [];
        node.courses.forEach(c => allTasks.push(...c.linkedTasks));
        
        const tasksWithPos = allTasks.map((t, idx) => {
           const isUp = idx % 2 === 0;
           const k = Math.floor(idx / 2);
           const taskX = x + 35 + (k * 20);
           const taskY = isUp ? y - 70 - (k * 42) : y + 70 + (k * 42);
           return { ...t, x: taskX, y: taskY, isUp };
        });
        
        return { ...node, x, y, tasksWithPos };
      });

      let sacredPath = `M 0 ${TIMELINE_Y}`;
      if (nodesLayout.length > 0) {
         const first = nodesLayout[0];
         sacredPath += ` C ${first.x / 2} ${TIMELINE_Y}, ${first.x / 2} ${first.y}, ${first.x} ${first.y}`;
         for (let i = 0; i < nodesLayout.length - 1; i++) {
            const curr = nodesLayout[i];
            const next = nodesLayout[i+1];
            const midX = (curr.x + next.x) / 2;
            sacredPath += ` C ${midX} ${curr.y}, ${midX} ${next.y}, ${next.x} ${next.y}`;
         }
         const last = nodesLayout[nodesLayout.length - 1];
         sacredPath += ` C ${last.x + 100} ${last.y}, ${last.x + 100} ${TIMELINE_Y}, ${last.x + 400} ${TIMELINE_Y}`;
      }

      const totalWidth = Math.max(1200, (nodesLayout.length * NODE_SPACING) + 400);

      return (
        <div className="flex flex-col bg-[var(--paper)] border-2 border-[var(--ink)] relative w-full h-[520px] overflow-hidden shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-30 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">

          <div className="flex-1 relative overflow-x-auto overflow-y-hidden custom-scrollbar bg-[var(--crt-bg)]" style={{ scrollBehavior: 'smooth' }}>

               <defs>
                 <filter id="loom-glow" x="-20%" y="-20%" width="140%" height="140%">
                   <feGaussianBlur stdDeviation="4" result="blur" />
                   <feMerge>
                     <feMergeNode in="blur"/>
                     <feMergeNode in="SourceGraphic"/>
                   </feMerge>
                 </filter>
                 <filter id="branch-glow" x="-20%" y="-20%" width="140%" height="140%">
                   <feGaussianBlur stdDeviation="2" result="blur" />
                   <feMerge>
                     <feMergeNode in="blur"/>
                     <feMergeNode in="SourceGraphic"/>

                 <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
                   <feGaussianBlur stdDeviation="6" result="blur" />
                   <feComponentTransfer in="blur" result="glow1">
                      <feFuncA type="linear" slope="3"/>
                   </feComponentTransfer>
                   <feMerge>
                     <feMergeNode in="glow1"/>
                     <feMergeNode in="SourceGraphic"/>
                   </feMerge>

               </defs>

               <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                 <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--paper)" strokeWidth="0.5" opacity="0.05" />
               </pattern>
               <rect width="100%" height="100%" fill="url(#grid)" />

               <path d={sacredPath} fill="none" stroke="var(--paper)" strokeWidth="12" opacity="0.15" filter="url(#loom-glow)" />
               <path d={sacredPath} fill="none" stroke="var(--paper)" strokeWidth="2" strokeDasharray="12 12" className="animate-flow" />

               {nodesLayout.map(n => n.tasksWithPos.map(t => {
                 const isDone = t.status === 'done';
                 const color = isDone ? 'var(--muted-fg)' : 'var(--stamp)';
                 const opacity = isDone ? '0.3' : '0.9';
                 const strokeWidth = isDone ? "2" : "3";
                 return (
                   <path 
                     key={t.id} 
                     d={`M ${n.x} ${n.y} C ${n.x + 20} ${n.y}, ${t.x - 20} ${t.y}, ${t.x} ${t.y}`} 
                     fill="none" 
                     stroke={color} 
                     strokeWidth={strokeWidth} 
                     opacity={opacity}
                     strokeDasharray={isDone ? "6 6" : "none"}
                     filter={!isDone ? "url(#branch-glow)" : "none"}
                   />
                 );
               }))}

               {nodesLayout.filter(n => n.isCollision).map((n, i) => (
                 <g key={i}>
                   <path d={`M ${n.x} ${n.y} Q ${n.x - 50} ${n.y - 100}, ${n.x + 30} ${n.y - 180}`} fill="none" stroke="var(--destructive)" strokeWidth="4" filter="url(#nexus-glow)" opacity="0.8" strokeDasharray="15 10" className="blink" />
                   <path d={`M ${n.x} ${n.y} Q ${n.x + 80} ${n.y + 90}, ${n.x - 20} ${n.y + 160}`} fill="none" stroke="var(--destructive)" strokeWidth="3" filter="url(#nexus-glow)" opacity="0.6" strokeDasharray="10 8" className="blink" />
                   <circle cx={n.x} cy={n.y} r="18" fill="transparent" stroke="var(--destructive)" strokeWidth="2" filter="url(#nexus-glow)" className="blink" />

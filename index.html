            <div className="absolute top-0 left-0 h-full pointer-events-auto z-10" style={{ width: totalWidth }}>
               {nodesLayout.length === 0 && (
                  <div className="flex h-full w-full items-center justify-center text-[var(--crt-fg)] opacity-50 uppercase tracking-widest font-sans px-4 text-center">
                     [ TIMELINE SECURE. NO DEADLINES ANCHORED. ]
                  </div>
               )}
               {nodesLayout.map(n => (
                  <React.Fragment key={n.date}>
                     <div className="absolute transform -translate-x-1/2 -translate-y-1/2 z-20" style={{ left: n.x, top: n.y }}>
                        <div className={`w-6 h-6 sm:w-8 sm:h-8 rounded-full border-[3px] flex items-center justify-center m-auto ${n.isCollision ? 'border-[var(--destructive)] bg-[var(--crt-bg)] shadow-[0_0_20px_var(--destructive)] blink' : 'border-[var(--paper)] bg-[var(--ink)] shadow-[0_0_15px_rgba(255,255,255,0.2)]'}`}>
                          <div className={`w-2 h-2 sm:w-3 sm:h-3 rounded-full ${n.isCollision ? 'bg-[var(--destructive)]' : 'bg-[var(--paper)]'}`}></div>
                        </div>
                        
                        <div className="absolute top-10 sm:top-12 left-1/2 transform -translate-x-1/2 bg-[var(--card)] border border-[var(--ink)] py-1 px-2 sm:px-3 whitespace-nowrap flex flex-col items-center z-30 shadow-[2px_2px_0_0_var(--ink)]">
                           <span className={`font-bold text-[11px] sm:text-[13px] uppercase ${n.isCollision ? 'text-[var(--destructive)]' : 'text-[var(--ink)]'}`}>{n.date}</span>
                           <span className="text-[8px] sm:text-[9px] uppercase tracking-widest opacity-80">{n.courses.map(c=>c.course).join(' + ')}</span>
                        </div>
                     </div>

                     {n.tasksWithPos.map(t => {
                        const isDone = t.status === 'done';
                        return (
                          <div 
                            key={t.id} 
                            className={`btn-timeline absolute transform -translate-y-1/2 flex flex-col justify-center transition-all border-l-[3px] p-2 z-30 ${isDone ? 'bg-[var(--crt-bg)] border-[var(--muted-fg)] opacity-60' : 'bg-[var(--card)] border-[var(--stamp)] shadow-[2px_2px_0_0_rgba(0,0,0,0.5)] sm:shadow-[4px_4px_0_0_rgba(0,0,0,0.5)]'}`} 
                            style={{ left: t.x + 5, top: t.y, width: '160px' }}
                            onClick={() => dispatch({ type: 'TOGGLE_TASK_STATUS', payload: t.id })}
                          >
                             <div className="flex justify-between items-start mb-1">
                               <span className={`text-[12px] sm:text-[13px] font-bold shrink-0 ${isDone ? 'text-[var(--muted-fg)]' : 'text-[var(--stamp)]'}`}>
                                 {isDone ? '[✕]' : '[ ]'}
                               </span>
                               <span className="text-[8px] sm:text-[9px] border border-current px-1 font-bold">W:{t.weight}</span>
                             </div>
                             <span className={`text-[10px] sm:text-[11px] uppercase font-bold tracking-wider leading-snug line-clamp-2 ${isDone ? 'line-through text-[var(--muted-fg)]' : 'text-[var(--ink)]'}`} title={t.title}>
                               {t.title}
                             </span>
                          </div>
                        );
                     })}
                  </React.Fragment>
               ))}
            </div>
          </div>
        </div>
      );
    };

    // ----------------------------------------------------
    // NEXUS INCIDENT LEDGER
    // ----------------------------------------------------
    const NexusLedger = () => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);
      const [newIncident, setNewIncident] = useState({ title: '', description: '' });
      const [newStepText, setNewStepText] = useState({});
      const [viewPruned, setViewPruned] = useState(false);

      const incidents = state.incidents || [];
      const activeIncidents = incidents.filter(i => i.status === 'active');
      const prunedIncidents = incidents.filter(i => i.status === 'pruned');
      const displayList = viewPruned ? prunedIncidents : activeIncidents;

      const logIncident = () => {
        if (newIncident.title) {
          dispatch({ type: 'ADD_INCIDENT', payload: { id: Date.now(), ...newIncident, status: 'active', steps: [] } });
          setNewIncident({ title: '', description: '' });
          toast('NEXUS EVENT LOGGED. VARIANCE THREAT DETECTED.', 'warning');
        } else {
          toast('INCIDENT IDENTIFIER REQUIRED.', 'info');
        }
      };

      const addStep = (incidentId) => {
        if (newStepText[incidentId]) {
          dispatch({ type: 'ADD_INCIDENT_STEP', payload: { incidentId, step: { id: Date.now(), text: newStepText[incidentId], done: false } } });
          setNewStepText({ ...newStepText, [incidentId]: '' });
        }
      };

      return (
        <div className="flex flex-col h-full bg-[var(--paper)] border-2 border-[var(--ink)] relative shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-10 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">
            <div>
              <div className="label">§V</div>
              <h2 className="text-3xl sm:text-4xl">NEXUS INCIDENTS</h2>
            </div>
            <div className="flex border-2 border-[var(--ink)] w-full sm:w-auto mt-2 sm:mt-0">
              <button onClick={() => setViewPruned(false)} className={`flex-1 sm:flex-none px-2 sm:px-4 py-2 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold transition-colors ${!viewPruned ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'}`}>
                ACTIVE [{activeIncidents.length}]
              </button>
              <button onClick={() => setViewPruned(true)} className={`flex-1 sm:flex-none px-2 sm:px-4 py-2 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold border-l-2 border-[var(--ink)] transition-colors ${viewPruned ? 'bg-[var(--destructive)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'}`}>
                ARCHIVES [{prunedIncidents.length}]
              </button>
            </div>
          </div>

          <div className="flex-1 flex flex-col p-2 sm:p-4 overflow-y-auto custom-scrollbar">
            {!viewPruned && (
              <div className="panel p-3 sm:p-4 mb-4 sm:mb-6 bg-[var(--card)] border-stamped">
                <span className="label !text-[var(--destructive)] !font-bold mb-2 sm:mb-3 text-[10px] sm:text-xs">REPORT TIMELINE ANOMALY</span>
                <input type="text" placeholder="BUG IDENTIFIER" className="input w-full mb-2 sm:mb-3" value={newIncident.title} onChange={e => setNewIncident({...newIncident, title: e.target.value})} />
                <textarea placeholder="DESCRIBE THE VARIANCE..." className="input w-full h-16 sm:h-20 py-2 mb-2 sm:mb-3 resize-none" value={newIncident.description} onChange={e => setNewIncident({...newIncident, description: e.target.value})} />
                <button onClick={logIncident} className="btn-primary w-full !bg-[var(--destructive)] hover:!bg-[var(--ink)] text-[12px] sm:text-[14px]">LOG EVENT ↳</button>
              </div>
            )}

            <div className="flex flex-col gap-4">
              {displayList.length === 0 ? (
                 <div className="text-center p-6 sm:p-8 opacity-60">
                   <span className="font-sans uppercase tracking-widest text-[10px] sm:text-sm">[ TIMELINE SECURE. NO EVENTS FOUND. ]</span>
                 </div>
              ) : displayList.map(incident => {
                const isPruned = incident.status === 'pruned';
                const progress = (incident.steps || []).length > 0 ? Math.round(((incident.steps || []).filter(s=>s.done).length / (incident.steps || []).length) * 100) : 0;
                
                return (
                  <div key={incident.id} className="panel bg-[var(--paper)] relative overflow-hidden">
                    {isPruned && (
                      <div className="absolute inset-0 z-0 flex items-center justify-center pointer-events-none opacity-20">
                         <div className="tva-stamp !text-[4rem] sm:!text-[6rem] !border-[6px] sm:!border-[8px] rotate-[-15deg] !text-[var(--destructive)] !border-[var(--destructive)]">PRUNED</div>
                      </div>
                    )}
                    <div className="head relative z-10 bg-[var(--card)] flex-col sm:flex-row items-start sm:items-center gap-2">
                      <span className={`font-bold text-[12px] sm:text-[14px] leading-tight ${isPruned ? 'line-through opacity-70' : 'text-[var(--destructive)]'}`}>{incident.title}</span>
                      <div className="flex gap-3 sm:gap-4 w-full sm:w-auto justify-end">
                        {!isPruned && (
                          <button onClick={() => {
                            dispatch({ type: 'PRUNE_INCIDENT', payload: incident.id });
                            toast('INCIDENT PRUNED. TIMELINE RESTORED.', 'success');
                          }} className="btn-outline !py-1 !px-2 sm:!px-3 !text-[9px] sm:!text-[10px] hover:!bg-[var(--destructive)] hover:!border-[var(--destructive)]" title="Mark Resolved">PRUNE EVENT</button>
                        )}
                        <button onClick={() => dispatch({ type: 'DELETE_INCIDENT', payload: incident.id })} className="btn-ghost !text-[var(--rust)] font-bold">✕</button>
                      </div>
                    </div>
                    <div className="body relative z-10 border-t border-[var(--ink)] p-3 sm:p-4">
                      <p className="font-sans text-[11px] sm:text-[13px] opacity-80 uppercase leading-relaxed mb-3 sm:mb-4">{incident.description}</p>
                      
                      <div className="bg-[var(--card)] border border-[var(--ink)] border-dashed p-3 sm:p-4">
                        <span className="label text-[9px] sm:text-[10px] !mb-2 sm:!mb-3">PRUNING PROTOCOL (STEPS) - {progress}%</span>
                        <div className="flex flex-col gap-2 mb-3 sm:mb-4">
                          {(incident.steps || []).map(step => (
                            <div key={step.id} className="flex gap-2 sm:gap-3 items-start font-sans text-[11px] sm:text-[13px] uppercase">
                              <button onClick={() => dispatch({ type: 'TOGGLE_INCIDENT_STEP', payload: { incidentId: incident.id, stepId: step.id }})} className={`btn-square w-4 h-4 sm:w-5 sm:h-5 shrink-0 flex items-center justify-center font-bold text-[10px] sm:text-[12px] leading-none pt-[1px] ${step.done ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--paper)] text-[var(--ink)]'}`}>
                                {step.done ? '✕' : ''}
                              </button>
                              <span className={`leading-snug pt-[1px] sm:pt-[2px] ${step.done ? 'line-through opacity-50' : ''}`}>{step.text}</span>
                            </div>
                          ))}
                          {(incident.steps || []).length === 0 && <span className="text-[10px] sm:text-[11px] opacity-50 uppercase">[ NO STEPS DEFINED ]</span>}
                        </div>
                        
                        {!isPruned && (
                          <div className="flex flex-wrap sm:flex-nowrap gap-2">
                            <input type="text" placeholder="ADD PROTOCOL STEP..." className="input w-full sm:flex-1 !h-8 !text-[10px] sm:!text-[11px] bg-[var(--paper)]" value={newStepText[incident.id] || ''} onChange={e => setNewStepText({...newStepText, [incident.id]: e.target.value})} onKeyDown={e => e.key === 'Enter' && addStep(incident.id)} />
                            <button onClick={() => addStep(incident.id)} className="btn-primary !bg-[var(--stamp)] hover:!bg-[var(--ink)] w-full sm:w-auto !py-0 !px-4 !h-8 !text-lg">+</button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )
              })}
            </div>
          </div>
        </div>
      );
    };

    // ----------------------------------------------------
    // EXISTING MODULES
    // ----------------------------------------------------

    const SyllabusVault = () => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);
      const [showForm, setShowForm] = useState(false);
      
      const getToday = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      };

      const [newCourse, setNewCourse] = useState({ course: '', deliverable: '', deadline: getToday(), type: 'Assignment' });
      const [quickTask, setQuickTask] = useState({});

      const handleAdd = () => {
        if (newCourse.course && newCourse.deliverable && newCourse.deadline) {
          dispatch({ type: 'ADD_SYLLABUS', payload: { id: Date.now(), status: 'active', ...newCourse } });
          toast(`REQUIREMENT LOGGED: ${newCourse.course}`, 'success');
          setShowForm(false);
          setNewCourse({ course: '', deliverable: '', deadline: getToday(), type: 'Assignment' });
        } else {
          toast('COURSE, DELIVERABLE & DEADLINE REQUIRED', 'warning');
        }
      };

      const handleAddQuickTask = (item) => {
        const taskTitle = quickTask[item.id];
        if (taskTitle && taskTitle.trim()) {
          const activeFocusTasks = (state.tasks || []).filter(t => t.status === 'todo' && t.isToday);
          const currentLoad = activeFocusTasks.reduce((acc, t) => acc + t.weight, 0);
          const forceBacklog = currentLoad >= 25; 

          dispatch({ 
            type: 'ADD_TASK', 
            payload: { id: Date.now(), title: taskTitle, weight: 5, status: 'todo', epic: item.course, isToday: !forceBacklog, syllabusId: item.id } 
          });
          toast(`CONVERGED TASK ASSIGNED ${forceBacklog ? '(FORCED TO BACKLOG)' : ''}`, forceBacklog ? 'warning' : 'success');
          setQuickTask({ ...quickTask, [item.id]: '' });
        } else {
          toast('TASK TITLE CANNOT BE EMPTY', 'warning');
        }
      };

      const sortedSyllabus = [...(state.syllabus || [])].sort((a, b) => new Date(a.deadline || '2099-01-01') - new Date(b.deadline || '2099-01-01'));

      return (
        <div className="flex flex-col h-full bg-[var(--paper)] border-2 border-[var(--ink)] relative shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-10 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">
            <div>
              <div className="label">§I</div>
              <h2 className="text-3xl sm:text-4xl">SYLLABUS VAULT</h2>
            </div>
            <button onClick={() => setShowForm(!showForm)} className="btn-outline !py-1 sm:!py-2 !px-3 sm:!px-4 text-[10px] sm:text-xs" title="Log New Requirement">
              {showForm ? '✕ CANCEL' : '+ LOG REQ'}
            </button>
          </div>

          <div className="flex flex-col gap-0 pb-4">
            {showForm && (
              <div className="panel animate-in fade-in slide-in-from-top-2 p-3 sm:p-4 m-2 sm:m-4 border-stamped bg-[var(--card)]">
                <div className="head !px-0 !pt-0 !border-b-0 mb-3 sm:mb-4"><span className="code text-[11px] sm:text-xs">FORM-SV-01</span><span className="text-[10px] sm:text-xs">NEW ENTRY</span></div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                  <div>
                    <label className="label">COURSE CODE</label>
                    <input type="text" placeholder="e.g. CS 410" className="input w-full" value={newCourse.course} onChange={e => setNewCourse({ ...newCourse, course: e.target.value })} />
                  </div>
                  <div>
                    <label className="label">DEADLINE</label>
                    <input type="date" className="input w-full" value={newCourse.deadline} onChange={e => setNewCourse({ ...newCourse, deadline: e.target.value })} />
                  </div>
                </div>
                <div className="mb-4">
                  <label className="label">DELIVERABLE DESCRIPTION</label>
                  <input type="text" placeholder="MILESTONE / OBJECTIVE" className="input w-full" value={newCourse.deliverable} onChange={e => setNewCourse({ ...newCourse, deliverable: e.target.value })} />
                </div>
                <button onClick={handleAdd} className="btn-stamp w-full !py-2 sm:!py-3 text-[14px] sm:text-[16px]">SUBMIT REQUIREMENT ↳</button>
              </div>
            )}

            {sortedSyllabus.map((item, index) => {
              const linkedTasks = (state.tasks || []).filter(t => t.syllabusId === item.id);
              const totalTasks = linkedTasks.length;
              const completedTasks = linkedTasks.filter(t => t.status === 'done').length;
              const progress = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
              const hasLinkedTasks = totalTasks > 0;
              const daysLeft = item.deadline ? Math.ceil((new Date(item.deadline) - new Date()) / (1000 * 60 * 60 * 24)) : null;
              const isOverdue = daysLeft !== null && daysLeft < 0;

              return (
                <div key={item.id} className={`panel !border-l-0 !border-r-0 !border-t-0 ${index === sortedSyllabus.length -1 ? '!border-b-0' : ''} bg-transparent`}>
                  <div className="head !bg-[var(--card)] flex-col sm:flex-row items-start sm:items-center gap-2">
                    <span className="code font-bold text-[13px] sm:text-[14px]">{item.course}</span>
                    <div className="flex items-center justify-between w-full sm:w-auto gap-4">
                      {item.deadline && (
                        <span className={`label !mb-0 font-bold ${isOverdue ? 'text-[var(--destructive)] blink' : ''}`}>
                          {daysLeft !== null ? (isOverdue ? `⚠ OVERDUE ${Math.abs(daysLeft)}D` : `T-${daysLeft}D`) : item.deadline}
                        </span>
                      )}
                      <button onClick={() => dispatch({ type: 'DELETE_SYLLABUS', payload: item.id })} className="btn-ghost !text-[var(--rust)] shrink-0" title="Prune Record">✕</button>
                    </div>
                  </div>
                  <div className="body flex flex-col gap-3 sm:gap-4 p-3 sm:p-4">
                    <p className="font-sans text-[13px] sm:text-[15px] leading-relaxed uppercase">{item.deliverable}</p>
                    
                    <div className="mt-1 sm:mt-2 p-3 sm:p-5 border-2 border-[var(--ink)] border-dashed bg-[var(--card)] flex flex-col">
                      {hasLinkedTasks ? (
                        <div className="mb-4 sm:mb-6">
                          <div className="flex justify-between items-end mb-2 sm:mb-3">
                            <span className="label !mb-0 text-[9px] sm:text-[11px]">CONVERGENCE PROGRESS</span>
                            <span className="font-bold text-[11px] sm:text-[13px]">{completedTasks} / {totalTasks} <span className="opacity-50 ml-1 font-normal">({progress}%)</span></span>
                          </div>
                          <div className="w-full h-4 sm:h-5 border border-[var(--ink)] flex p-[2px] gap-[2px] mb-3 sm:mb-5 bg-[var(--paper)]">
                             {Array.from({length: totalTasks}).map((_, i) => (
                               <div key={i} className={`flex-1 transition-colors duration-300 ${i < completedTasks ? 'bg-[var(--ink)]' : 'bg-transparent border border-[var(--ink)] border-dashed'}`}></div>
                             ))}
                          </div>
                          <div className="flex flex-col gap-2">
                             {linkedTasks.map(t => (
                               <div key={t.id} className="text-[11px] sm:text-[13px] uppercase font-sans flex justify-between items-start opacity-80 hover:opacity-100 transition-opacity">
                                 <span className={`pr-2 sm:pr-4 flex gap-2 items-start ${t.status === 'done' ? 'line-through opacity-50' : ''}`}>
                                   <button onClick={() => dispatch({ type: 'TOGGLE_TASK_STATUS', payload: t.id })} className={`btn-square w-4 h-4 sm:w-5 sm:h-5 shrink-0 flex items-center justify-center text-[10px] sm:text-[12px] font-bold leading-none pt-[1px] ${t.status === 'done' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--paper)] text-[var(--ink)]'}`}>
                                     {t.status === 'done' ? '✕' : ''}
                                   </button>
                                   <span className={`leading-snug break-words pt-[1px] sm:pt-[2px]`}>{t.title}</span>
                                 </span>
                                 <span className="shrink-0 text-[9px] sm:text-[11px] border border-[var(--ink)] px-1 sm:px-2 py-[1px] sm:py-[2px] font-bold">W:{t.weight}</span>
                               </div>
                             ))}
                          </div>
                        </div>
                      ) : (
                        <div className="label text-[var(--stamp)] text-[10px] sm:text-[12px] !mb-3 sm:!mb-5 flex items-center gap-2"><span className="blink">■</span> AWAITING CONVERGENCE</div>
                      )}

                      <div className="flex flex-wrap sm:flex-nowrap gap-2 sm:gap-3 mt-auto">
                        <input type="text" className="input w-full sm:flex-1 h-10 !text-[11px] sm:!text-[13px] !px-3 bg-[var(--paper)] border-dashed focus:border-solid focus:bg-[var(--card)]" placeholder="ASSIGN CONVERGED TASK..." value={quickTask[item.id] || ''} onChange={(e) => setQuickTask({...quickTask, [item.id]: e.target.value})} onKeyDown={(e) => e.key === 'Enter' && handleAddQuickTask(item)} />
                        <button onClick={() => handleAddQuickTask(item)} className="btn-primary !bg-[var(--stamp)] hover:!bg-[var(--ink)] w-full sm:w-auto !py-0 !px-4 font-sans !text-xl sm:!text-2xl flex items-center justify-center shrink-0 h-10">+</button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
            {(state.syllabus || []).length === 0 && (
               <div className="text-center p-6 sm:p-8 flex flex-col items-center gap-3 sm:gap-4 opacity-60 m-auto">
                 <span className="text-3xl sm:text-4xl">§</span>
                 <p className="label text-[10px] sm:text-[12px]">VAULT EMPTY. NO ACTIVE DIRECTIVES.</p>
               </div>
            )}
          </div>
        </div>
      );
    };

    const TaskMatrix = () => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);
      const [newTask, setNewTask] = useState({ title: '', weight: 5, epic: '', syllabusId: null });
      const [viewState, setViewState] = useState('focus');

      // Chrono-Monitor State
      const focusDurationMins = state.settings?.focusDuration || 25;
      const [timerLeft, setTimerLeft] = useState(focusDurationMins * 60);
      const [timerActive, setTimerActive] = useState(false);

      useEffect(() => {
        if (!timerActive) {
          setTimerLeft((state.settings?.focusDuration || 25) * 60);
        }
      }, [state.settings?.focusDuration, timerActive]);

      useEffect(() => {
        let interval = null;
        if (timerActive && timerLeft > 0) {
          interval = setInterval(() => setTimerLeft(t => t - 1), 1000);
        } else if (timerLeft === 0 && timerActive) {
          setTimerActive(false);
          toast('AUTHORIZED FOCUS SESSION COMPLETE. VARIANCE MINIMIZED.', 'success');
        }
        return () => clearInterval(interval);
      }, [timerActive, timerLeft, toast]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const MAX_DAILY_LOAD = 25; 
      const activeFocusTasks = (state.tasks || []).filter(t => t.status === 'todo' && t.isToday);
      const currentLoad = activeFocusTasks.reduce((acc, t) => acc + t.weight, 0);
      const isOverloaded = currentLoad >= MAX_DAILY_LOAD;
      const backlogTasks = (state.tasks || []).filter(t => t.status === 'todo' && !t.isToday);
      const completedTasks = (state.tasks || []).filter(t => t.status === 'done');
      const stats = state.stats || { clearancePoints: 0 };

      const handleAddTask = () => {
        if (newTask.title) {
          const forceBacklog = isOverloaded && viewState === 'focus';
          dispatch({ 
            type: 'ADD_TASK', 
            payload: { id: Date.now(), status: 'todo', isToday: forceBacklog ? false : (viewState === 'focus'), syllabusId: newTask.syllabusId || null, title: newTask.title, weight: newTask.weight, epic: newTask.epic || '' } 
          });
          toast(`TASK INITIALIZED ${forceBacklog ? '(FORCED TO BACKLOG)' : ''}`, forceBacklog ? 'warning' : 'info');
          setNewTask({ title: '', weight: 5, epic: '', syllabusId: null });
        } else {
          toast('TASK DIRECTIVE CANNOT BE EMPTY', 'warning');
        }
      };

      const handleToggleTask = (task) => {
        if (task.status === 'todo' && timerActive) {
           const points = task.weight * 10;
           dispatch({ type: 'ADD_CLEARANCE_POINTS', payload: points });
           toast(`FOCUS YIELD: +${points} CLEARANCE POINTS`, 'success');
        }
        dispatch({ type: 'TOGGLE_TASK_STATUS', payload: task.id });
      };

      const renderTask = (task) => (
        <div key={task.id} className={`panel mb-3 sm:mb-4 bg-[var(--card)] transition-colors ${task.status === 'done' ? 'opacity-50' : 'border-stamped'}`}>
          <div className="p-3 sm:p-4 flex items-start justify-between gap-3 sm:gap-4">
            <button onClick={() => handleToggleTask(task)} className={`btn-square w-5 h-5 sm:w-6 sm:h-6 mt-0 shrink-0 flex items-center justify-center font-bold text-[12px] sm:text-[14px] leading-none pt-[1px] sm:pt-[2px] ${task.status === 'done' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--paper)] text-[var(--ink)]'}`}>
              {task.status === 'done' ? '✕' : ''}
            </button>
            <div className="flex-1 min-w-0 mt-[1px] sm:mt-[2px]">
              <p className={`font-sans text-[12px] sm:text-[14px] leading-tight uppercase break-words pt-[1px] sm:pt-[2px] ${task.status === 'done' ? 'line-through text-[var(--muted-fg)]' : ''}`}>{task.title}</p>
              <div className="flex items-center gap-2 sm:gap-3 mt-2 sm:mt-3 flex-wrap">
                {task.epic && <span className="label !mb-0 border border-[var(--ink)] px-1 sm:px-2 py-1 text-[9px] sm:text-[10px] bg-[var(--paper)]">REF: {task.epic}</span>}
                {task.syllabusId && <span className="label !mb-0 text-[var(--stamp)] border border-[var(--stamp)] px-1 sm:px-2 py-1 text-[9px] sm:text-[10px] flex items-center gap-1 sm:gap-2 bg-[var(--paper)]"><span className="blink">■</span> CONVERGED</span>}
              </div>
            </div>
            <div className="flex flex-col items-end gap-2 sm:gap-3 shrink-0">
              <span className="tva-stamp !text-[10px] sm:text-[12px] !px-1 sm:!px-2" style={{ transform: task.weight > 7 ? 'rotate(-6deg)' : 'rotate(-2deg)', color: task.weight > 7 ? 'var(--stamp)' : 'inherit', borderColor: task.weight > 7 ? 'var(--stamp)' : 'var(--ink)' }}>W:{task.weight}</span>
              <div className="flex gap-2 sm:gap-4 mt-1">
                {task.status !== 'done' && (
                  <button onClick={() => dispatch({ type: 'TOGGLE_TASK_TODAY', payload: task.id })} className="btn-ghost font-bold text-base sm:text-lg" disabled={timerActive} title={task.isToday ? "DEMOTE TO BACKLOG" : "PROMOTE TO FOCUS"}>
                    {task.isToday ? '↓' : '↑'}
                  </button>
                )}
                <button onClick={() => dispatch({ type: 'DELETE_TASK', payload: task.id })} disabled={timerActive} className="btn-ghost !text-[var(--rust)] font-bold text-base sm:text-lg">✕</button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col h-full bg-[var(--paper)] border-2 border-[var(--ink)] relative shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-10 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">
            <div>
              <div className="label">§II</div>
              <h2 className="text-3xl sm:text-4xl">TASK MATRIX</h2>
            </div>
            <div className="flex flex-col items-end">
               <span className="label !mb-1 text-[9px] sm:text-[10px]">CLEARANCE</span>
               <span className="font-display text-xl sm:text-2xl text-[var(--stamp)] font-bold">{stats.clearancePoints} PTS</span>
            </div>
          </div>

          <div className="bg-[var(--crt-bg)] border-b-2 border-[var(--ink)] p-3 sm:p-4 flex flex-col sm:flex-row gap-3 sm:gap-4 items-center justify-between shadow-[inset_0_0_20px_rgba(0,0,0,0.5)]">
            <div className="flex flex-col items-center sm:items-start">
              <span className="label !text-[var(--stamp)] opacity-70 flex items-center gap-2 text-[10px] sm:text-xs">
                 <div className={`w-2 h-2 rounded-full ${timerActive ? 'bg-[var(--stamp)] blink' : 'bg-gray-600'}`}></div>
                 CHRONO-MONITOR
              </span>
              <span className="font-raster text-5xl sm:text-6xl md:text-7xl leading-none" style={{ color: 'var(--stamp)', textShadow: timerActive ? '0 0 15px var(--stamp)' : 'none' }}>
                 {formatTime(timerLeft)}
              </span>
            </div>
            <div className="flex flex-col gap-2 shrink-0 w-full sm:w-auto">
               <button onClick={() => setTimerActive(!timerActive)} className={`btn-crt border-2 border-[var(--stamp)] px-3 sm:px-4 py-2 font-display text-base sm:text-lg uppercase tracking-wide sm:tracking-widest font-bold w-full sm:w-auto ${timerActive ? 'bg-[var(--stamp)] text-[var(--crt-bg)]' : 'text-[var(--stamp)]'}`}>
                 {timerActive ? '[ PAUSE TIMELINE ]' : '[ AUTHORIZE FOCUS ]'}
               </button>
               <button onClick={() => { setTimerActive(false); setTimerLeft((state.settings?.focusDuration || 25) * 60); }} className="text-[var(--stamp)] opacity-60 hover:opacity-100 font-sans text-[10px] sm:text-xs uppercase tracking-widest text-center sm:text-right transition-opacity cursor-pointer border-none bg-transparent">
                 [ RESET TIMELINE ]
               </button>
            </div>
          </div>

          <div className="flex border-b border-[var(--ink)]">
            <button onClick={() => !timerActive && setViewState('focus')} disabled={timerActive} className={`flex-1 py-2 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold transition-colors ${viewState === 'focus' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'} ${timerActive ? 'opacity-50 cursor-not-allowed' : ''}`}>FOCUS [{activeFocusTasks.length}]</button>
            <button onClick={() => !timerActive && setViewState('backlog')} disabled={timerActive} className={`flex-1 py-2 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold border-l-2 border-[var(--ink)] transition-colors ${viewState === 'backlog' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'} ${timerActive ? 'opacity-50 cursor-not-allowed' : ''}`}>BACKLOG [{backlogTasks.length}]</button>
          </div>

          <div className="relative">
            {timerActive && (
              <div className="absolute inset-0 z-20 flex items-center justify-center bg-[var(--card)] bg-opacity-70 backdrop-blur-[2px]">
                 <div className="text-[var(--stamp)] font-display text-lg sm:text-xl uppercase tracking-widest border-2 border-[var(--stamp)] px-3 sm:px-4 py-2 bg-[var(--crt-bg)] shadow-[0_0_15px_var(--stamp)] animate-pulse text-center">
                     MATRIX LOCKED.<br className="sm:hidden" /> MAINTAIN FOCUS.
                 </div>
              </div>
            )}
            
            <div className="p-3 sm:p-4 border-b border-[var(--ink)] border-dashed bg-[var(--card)] shrink-0">
              <div className="flex justify-between items-end mb-2 sm:mb-3">
                <span className="label !mb-0 flex items-center text-[10px] sm:text-xs">
                  <span className={`status-dot blink shrink-0 mr-2 sm:mr-3 ${isOverloaded ? 'bg-[var(--destructive)]' : ''}`}></span> COGNITIVE LOAD
                </span>
                <span className={`font-display text-2xl sm:text-3xl font-black ${isOverloaded ? 'text-[var(--destructive)]' : 'text-[var(--ink)]'}`}>{currentLoad} / {MAX_DAILY_LOAD}</span>
              </div>
              <div className="flex gap-[1px] sm:gap-[2px] h-4 sm:h-5 border border-[var(--ink)] p-[1px] sm:p-[2px] bg-[var(--paper)]">
                {Array.from({ length: MAX_DAILY_LOAD }).map((_, i) => (
                   <div key={i} className={`flex-1 border-r border-[var(--ink)] opacity-80 last:border-0 ${i < currentLoad ? (isOverloaded ? 'bg-[var(--destructive)]' : 'bg-[var(--ink)]') : 'bg-transparent'}`}></div>
                ))}
              </div>
              {isOverloaded && <p className="label text-[var(--destructive)] mt-2 sm:mt-3 text-[9px] sm:text-[11px]">⚠ MAXIMUM COGNITIVE LOAD EXCEEDED. ASSIGNMENTS RESTRICTED.</p>}
              
              <div className="flex flex-col gap-2 mt-3 sm:mt-4">
                 <div className="flex gap-2">
                   <input type="text" placeholder="ENTER TASK DIRECTIVE..." className="input flex-1 min-w-0" value={newTask.title} onChange={e => setNewTask({ ...newTask, title: e.target.value })} onKeyDown={e => e.key === 'Enter' && handleAddTask()} />
                   <input type="number" min="1" max="10" className="input w-14 sm:w-16 md:w-20 text-center shrink-0 px-1 sm:px-3" value={newTask.weight} onChange={e => setNewTask({ ...newTask, weight: parseInt(e.target.value) || 1 })} title="WEIGHT (1-10)" />
                   <button onClick={handleAddTask} className="btn-primary !bg-[var(--stamp)] hover:!bg-[var(--ink)] flex items-center justify-center w-10 sm:w-12 md:w-14 text-xl sm:text-2xl font-sans !p-0 shrink-0" title="INITIALIZE">+</button>
                 </div>
                 <div className="flex flex-col sm:flex-row gap-2">
                   <input type="text" placeholder="REF (EPIC)..." className="input w-full sm:flex-1 min-w-0 !h-10 sm:!h-8 !text-[11px] !px-2 bg-[var(--paper)] border-dashed focus:border-solid focus:bg-[var(--card)]" value={newTask.epic} onChange={e => setNewTask({ ...newTask, epic: e.target.value })} onKeyDown={e => e.key === 'Enter' && handleAddTask()} />
                   <select className="input w-full sm:flex-1 min-w-0 !h-10 sm:!h-8 !text-[11px] !px-2 bg-[var(--paper)] border-dashed focus:border-solid focus:bg-[var(--card)] uppercase" value={newTask.syllabusId || ''} onChange={e => setNewTask({ ...newTask, syllabusId: e.target.value ? parseInt(e.target.value) : null })}>
                      <option value="">[ NO CONVERGENCE ]</option>
                      {(state.syllabus || []).map(s => <option key={s.id} value={s.id}>CONVERGE: {s.course}</option>)}
                   </select>
                 </div>
              </div>
            </div>
          </div>

          <div className="flex flex-col p-2 sm:p-4 overflow-y-auto custom-scrollbar flex-1 min-h-[300px]">
            {viewState === 'focus' ? (
              <>
                {activeFocusTasks.length === 0 ? (
                  <div className="border-dashed p-6 sm:p-8 text-center text-[var(--muted-fg)] font-sans uppercase tracking-wide sm:tracking-widest text-[10px] sm:text-sm opacity-70">[ NO ACTIVE DIRECTIVES. PULL FROM BACKLOG. ]</div>
                ) : (
                  activeFocusTasks.map(renderTask)
                )}
                {completedTasks.filter(t => t.isToday).length > 0 && (
                  <div className="mt-6 sm:mt-8 pt-4 sm:pt-6 border-t-2 border-[var(--ink)]">
                    <div className="label mb-3 sm:mb-4">COMPLETED LOG (TODAY)</div>
                    <div>{completedTasks.filter(t => t.isToday).map(renderTask)}</div>
                  </div>
                )}
              </>
            ) : (
              <>
                {backlogTasks.length === 0 ? (
                  <div className="border-dashed p-6 sm:p-8 text-center text-[var(--muted-fg)] font-sans uppercase tracking-wide sm:tracking-widest text-[10px] sm:text-sm opacity-70">[ BACKLOG IS EMPTY. ]</div>
                ) : (
                  backlogTasks.map(renderTask)
                )}
              </>
            )}
          </div>
        </div>
      );
    };

    const LogicCircuitViewer = ({ code }) => {
      if (!code) return <div className="text-[var(--muted-fg)] font-raster text-sm p-4">AWAITING LOGIC INPUT</div>;

      try {
        let isPrimitive = false;
        let op = '';
        let inputs = [];

        if (code === '0' || code === '1') {
          return <div className="p-8 text-center text-3xl font-bold font-raster fill-[var(--ink)]">F = {code}</div>;
        } else if (/^[A-Z]['′]?$/.test(code)) {
          isPrimitive = true; op = 'WIRE'; inputs = [code];
        } else if (/^\((?:[A-Z]\s*\+\s*)+[A-Z]\)['′]$/.test(code)) {
          isPrimitive = true; op = 'NOR'; inputs = code.match(/[A-Z]/g);
        } else if (/^\((?:[A-Z])+\)['′]$/.test(code)) {
          isPrimitive = true; op = 'NAND'; inputs = code.match(/[A-Z]/g);
        } else if (/^(?:[A-Z]['′]?\s*\+\s*)+[A-Z]['′]?$/.test(code)) {
          isPrimitive = true; op = 'OR'; inputs = code.match(/[A-Z]['′]?/g);
        } else if (/^(?:[A-Z]['′]?\s*(?:⊕|\\oplus)\s*)+[A-Z]['′]?$/.test(code)) {
          isPrimitive = true; op = 'XOR'; inputs = code.match(/[A-Z]['′]?/g);
        } else if (/^(?:[A-Z]['′]?\s*(?:⊙|\\odot)\s*)+[A-Z]['′]?$/.test(code)) {
          isPrimitive = true; op = 'XNOR'; inputs = code.match(/[A-Z]['′]?/g);
        } else if (/^(?:[A-Z]['′]?){2,}$/.test(code)) {
          isPrimitive = true; op = 'AND'; inputs = code.match(/[A-Z]['′]?/g);
        }

        const getGateColor = (gateOp) => {
          if (gateOp.includes('AND')) return 'var(--stamp)';
          if (gateOp.includes('OR') && !gateOp.includes('X')) return 'var(--rust)';
          return 'var(--ink)';
        };

        const SVG_GATES = {
          AND: (x, y) => <path d={`M ${x} ${y-16} L ${x+14} ${y-16} A 16 16 0 0 1 ${x+14} ${y+16} L ${x} ${y+16} Z`} fill="color-mix(in srgb, var(--stamp) 15%, var(--card))" stroke="var(--stamp)" strokeWidth="2.5" strokeLinejoin="round" />,
          NAND: (x, y) => <g><path d={`M ${x} ${y-16} L ${x+14} ${y-16} A 16 16 0 0 1 ${x+14} ${y+16} L ${x} ${y+16} Z`} fill="color-mix(in srgb, var(--stamp) 15%, var(--card))" stroke="var(--stamp)" strokeWidth="2.5" strokeLinejoin="round" /><circle cx={x+34} cy={y} r="4" fill="var(--card)" stroke="var(--stamp)" strokeWidth="2.5" /></g>,
          OR: (x, y) => <path d={`M ${x} ${y-16} Q ${x+14} ${y-16} ${x+30} ${y} Q ${x+14} ${y+16} ${x} ${y+16} Q ${x+10} ${y} ${x} ${y-16} Z`} fill="color-mix(in srgb, var(--rust) 15%, var(--card))" stroke="var(--rust)" strokeWidth="2.5" strokeLinejoin="round" />,
          NOR: (x, y) => <g><path d={`M ${x} ${y-16} Q ${x+14} ${y-16} ${x+30} ${y} Q ${x+14} ${y+16} ${x} ${y+16} Q ${x+10} ${y} ${x} ${y-16} Z`} fill="color-mix(in srgb, var(--rust) 15%, var(--card))" stroke="var(--rust)" strokeWidth="2.5" strokeLinejoin="round" /><circle cx={x+34} cy={y} r="4" fill="var(--card)" stroke="var(--rust)" strokeWidth="2.5" /></g>,
          XOR: (x, y) => <g><path d={`M ${x+6} ${y-16} Q ${x+20} ${y-16} ${x+36} ${y} Q ${x+20} ${y+16} ${x+6} ${y+16} Q ${x+16} ${y} ${x+6} ${y-16} Z`} fill="color-mix(in srgb, var(--ink) 15%, var(--card))" stroke="var(--ink)" strokeWidth="2.5" strokeLinejoin="round" /><path d={`M ${x} ${y-16} Q ${x+10} ${y} ${x} ${y+16}`} fill="none" stroke="var(--ink)" strokeWidth="2.5" strokeLinecap="round" /></g>,
          XNOR: (x, y) => <g><path d={`M ${x+6} ${y-16} Q ${x+20} ${y-16} ${x+36} ${y} Q ${x+20} ${y+16} ${x+6} ${y+16} Q ${x+16} ${y} ${x+6} ${y-16} Z`} fill="color-mix(in srgb, var(--ink) 15%, var(--card))" stroke="var(--ink)" strokeWidth="2.5" strokeLinejoin="round" /><path d={`M ${x} ${y-16} Q ${x+10} ${y} ${x} ${y+16}`} fill="none" stroke="var(--ink)" strokeWidth="2.5" strokeLinecap="round" /><circle cx={x+40} cy={y} r="4" fill="var(--card)" stroke="var(--ink)" strokeWidth="2.5" /></g>,
        };

        if (isPrimitive) {
          if (op === 'WIRE') {
            return (
              <div className="w-full overflow-x-auto custom-scrollbar flex justify-center p-2 min-h-[128px] items-center">
                <svg viewBox="0 0 220 128" className="h-auto w-full max-w-[220px] font-sans" preserveAspectRatio="xMidYMid meet">
                  <text x="20" y="68" fill="var(--stamp)" className="text-[16px] font-black">{inputs[0]}</text>
                  <line x1="35" y1="64" x2="160" y2="64" stroke="var(--stamp)" strokeWidth="2.5" />
                  <text x="170" y="68" fill="var(--stamp)" className="text-[16px] font-bold">F</text>
                </svg>
              </div>
            );
          }

          const getTipOffset = (g) => {
            if (g === 'AND' || g === 'OR') return 30;
            if (g === 'XOR') return 36;
            if (g === 'NAND' || g === 'NOR') return 38;
            if (g === 'XNOR') return 44;
            return 0;
          };
          
          const finalOutX = 90 + getTipOffset(op);
          const gateColor = getGateColor(op);

          return (
            <div className="w-full overflow-x-auto custom-scrollbar flex justify-center p-2 min-h-[128px] items-center">
              <svg viewBox="0 0 220 128" className="h-auto w-full max-w-[220px] font-sans" preserveAspectRatio="xMidYMid meet">
                {/* 1. Input Lines first so they fall behind the solid gates */}
                {inputs.map((inp, idx) => {
                   const startY = 64 - ((inputs.length - 1) * 10);
                   const y = startY + idx * 20;
                   return (
                     <g key={idx}>
                       <text x="20" y={y+5} fill={gateColor} className="text-[16px] font-black">{inp}</text>
                       <line x1="35" y1={y} x2="102" y2={y} stroke={gateColor} strokeWidth="2.5" />
                     </g>
                   )
                })}
                {/* 2. Gate over the input lines */}
                {SVG_GATES[op](90, 64)}
                {/* 3. Output Line */}
                <line x1={finalOutX} y1="64" x2="160" y2="64" stroke={gateColor} strokeWidth="2.5" />
                <text x="170" y="68" fill={gateColor} className="text-[16px] font-bold">F</text>
              </svg>
            </div>
          );
        }

        const terms = code.split(/\s*\+\s*/);
        const varSet = new Set();
        const parsedTerms = terms.map(term => {
           const factors = term.match(/[A-Z]['′]?/g) || [];
           factors.forEach(f => {
              const v = f.replace(/['′]/g, '');
              varSet.add(v);
           });
           return factors;
        });

        const varList = Array.from(varSet).sort();
        
        const busSpacing = 30;
        const startX = 30;
        const andX = startX + varList.length * busSpacing + 40;
        const termSpacing = 60;
        const orX = andX + 80;
        const totalHeight = Math.max(120, parsedTerms.length * termSpacing + 40);
        const totalWidth = orX + 100;
        
        const firstY = 50;
        const lastY = 50 + (parsedTerms.length - 1) * termSpacing;
        const orCenterY = (firstY + lastY) / 2;

        return (
          <div className="w-full overflow-x-auto custom-scrollbar flex justify-center p-2">
            <svg viewBox={`0 0 ${totalWidth} ${totalHeight}`} className="h-auto font-sans" style={{ width: '100%', minWidth: `${Math.min(totalWidth, 350)}px`, maxHeight: '400px' }} preserveAspectRatio="xMidYMid meet">
               
               {/* LAYER 1: Buses and Interconnect Lines */}
               {varList.map((v, i) => {
                  const x = startX + i * busSpacing;
                  return (
                     <g key={`bus-${v}`}>
                       <text x={x} y={20} fill="var(--stamp)" className="font-black text-[16px]" textAnchor="middle">{v}</text>
                       <line x1={x} y1={25} x2={x} y2={totalHeight-15} stroke="var(--stamp)" strokeWidth="2.5" className="opacity-40" />
                     </g>
                  );
               })}

               {parsedTerms.map((factors, termIdx) => {
                  const y = 50 + termIdx * termSpacing;
                  const orInY = parsedTerms.length > 1 ? (orCenterY + (termIdx - (parsedTerms.length - 1) / 2) * (20 / Math.max(1, parsedTerms.length - 1))) : y;
                  
                  return (
                    <g key={`wiring-${termIdx}`}>
                      {factors.map((factor, fIdx) => {
                         const isNot = factor.includes("'") || factor.includes("′");
                         const v = factor.replace(/['′]/g, '');
                         const vIdx = varList.indexOf(v);
                         const busX = startX + vIdx * busSpacing;
                         const targetY = y + (factors.length > 1 ? (fIdx - (factors.length-1)/2) * 10 : 0);
                         const targetGateX = factors.length > 1 ? andX : (parsedTerms.length > 1 ? orX : andX);
                         
                         const lineColor = factors.length > 1 ? 'var(--stamp)' : (parsedTerms.length > 1 ? 'var(--rust)' : 'var(--stamp)');
                         
                         return (
                            <g key={`factor-${fIdx}`}>
                              <circle cx={busX} cy={targetY} r="4" fill={lineColor} />
                              <path d={`M ${busX} ${targetY} L ${targetGateX - (isNot ? 8 : -12)} ${targetY}`} fill="none" stroke={lineColor} strokeWidth="2.5" />
                              {isNot && <circle cx={targetGateX-4} cy={targetY} r="4" fill="var(--card)" stroke={lineColor} strokeWidth="2.5" />}
                            </g>
                         )
                      })}
                      
                      {/* AND to OR connection */}
                      {parsedTerms.length > 1 && factors.length > 1 && (
                         <path d={`M ${andX+30} ${y} L ${orX-15} ${y} L ${orX-15} ${orInY} L ${orX+12} ${orInY}`} fill="none" stroke="var(--rust)" strokeWidth="2.5" strokeLinejoin="round" />
                      )}
                    </g>
                  )
               })}

               {/* LAYER 2: Gates */}
               {parsedTerms.map((factors, termIdx) => {
                  const y = 50 + termIdx * termSpacing;
                  if (factors.length > 1) {
                    return <g key={`gate-and-${termIdx}`}>{SVG_GATES['AND'](andX, y)}</g>;
                  }
                  return null;
               })}
               
               {parsedTerms.length > 1 && SVG_GATES['OR'](orX, orCenterY)}

               {/* LAYER 3: Output */}
               {parsedTerms.length > 1 && (
                 <g>
                   <line x1={orX+30} y1={orCenterY} x2={orX+55} y2={orCenterY} stroke="var(--rust)" strokeWidth="2.5" />
                   <text x={orX+65} y={orCenterY + 5} fill="var(--rust)" className="font-bold text-[16px]">F</text>
                 </g>
               )}
               {parsedTerms.length === 1 && parsedTerms[0].length > 1 && (
                 <g>
                   <line x1={andX+30} y1={50} x2={andX+55} y2={50} stroke="var(--stamp)" strokeWidth="2.5" />
                   <text x={andX+65} y={55} fill="var(--stamp)" className="font-bold text-[16px]">F</text>
                 </g>
               )}
               {parsedTerms.length === 1 && parsedTerms[0].length === 1 && (
                 <g>
                   <line x1={andX+12} y1={50} x2={andX+35} y2={50} stroke="var(--stamp)" strokeWidth="2.5" />
                   <text x={andX+45} y={55} fill="var(--stamp)" className="font-bold text-[16px]">F</text>
                 </g>
               )}
            </svg>
          </div>
        );
      } catch(e) {
        return <div className="text-[var(--destructive)] font-raster text-sm p-4 text-center w-full">SCHEMATIC RENDER ERROR: INVALID LOGIC EQUATION</div>;
      }
    };

    const ResourceConsole = () => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);
      const [activeTab, setActiveTab] = useState('inventory'); 
      const [newInv, setNewInv] = useState({ name: '', category: 'Component', quantity: 1, minStock: 0, specs: '' });
      const [showInvForm, setShowInvForm] = useState(false);
      const [ttInputs, setTtInputs] = useState(2);
      const [ttOutputs, setTtOutputs] = useState([{ name: 'F', values: {} }]);
      const [ttName, setTtName] = useState('');
      const [newFormula, setNewFormula] = useState({ title: '', code: '', tags: 'Equation' });
      const [selectedTtId, setSelectedTtId] = useState('');
      const [selectedTtOutIdx, setSelectedTtOutIdx] = useState(0);

      // Latex Compiler Faux-Terminal State
      const [isCompiling, setIsCompiling] = useState(false);
      const [terminalLogs, setTerminalLogs] = useState([]);

      const updateInvQty = (id, current, delta) => dispatch({ type: 'UPDATE_INVENTORY', payload: { id, quantity: Math.max(0, current + delta) } });

      const handleAddInv = () => {
        if (newInv.name) {
          dispatch({ type: 'ADD_INVENTORY', payload: { id: Date.now(), ...newInv } });
          setNewInv({ name: '', category: 'Component', quantity: 1, minStock: 0, specs: '' });
          setShowInvForm(false);
          toast('COMPONENT RECORDED TO LEDGER', 'success');
        } else { toast('COMPONENT DESIGNATION REQUIRED', 'warning'); }
      };

      const generateTTMatrix = () => Array.from({length: Math.pow(2, ttInputs)}, (_, i) => i.toString(2).padStart(ttInputs, '0'));

      const toggleTtOutput = (outputIndex, rowKey) => {
        setTtOutputs(ttOutputs.map((out, idx) => idx !== outputIndex ? out : { ...out, values: { ...out.values, [rowKey]: (out.values[rowKey] || 0) === 0 ? 1 : 0 } }));
      };

      const addTtOutput = () => setTtOutputs([...ttOutputs, { name: `F${ttOutputs.length + 1}`, values: {} }]);

      const removeTtOutput = () => {
        if (ttOutputs.length > 1) {
          setTtOutputs(ttOutputs.slice(0, -1));
        }
      };

      const saveTruthTable = () => {
        if (!ttName) return toast('TABLE IDENTIFIER REQUIRED', 'warning');
        dispatch({ type: 'SAVE_TRUTH_TABLE', payload: { id: Date.now(), name: ttName, inputs: ttInputs, outputs: ttOutputs } });
        toast('TRUTH TABLE SECURED', 'success');
        setTtName('');
      };

      const generateBooleanEquation = (inputsCount, valuesMap) => {
        const inputsList = ['A', 'B', 'C', 'D'].slice(0, inputsCount);
        const rows = Math.pow(2, inputsCount);
        let onesCount = 0;
        let isXOR = true;
        let isXNOR = true;

        for (let i = 0; i < rows; i++) {
          const bin = i.toString(2).padStart(inputsCount, '0');
          const val = valuesMap[bin] || 0;
          if (val === 1) onesCount++;

          const inputOnes = bin.split('').filter(b => b === '1').length;
          if (inputOnes % 2 === 1 && val !== 1) isXOR = false;
          if (inputOnes % 2 === 0 && val !== 0) isXOR = false;

          if (inputOnes % 2 === 0 && val !== 1) isXNOR = false;
          if (inputOnes % 2 === 1 && val !== 0) isXNOR = false;
        }

        if (onesCount === 0) return '0';
        if (onesCount === rows) return '1';

        const lastBin = '1'.repeat(inputsCount);
        const firstBin = '0'.repeat(inputsCount);

        if (onesCount === 1 && valuesMap[lastBin] === 1) return inputsList.join('');
        if (onesCount === rows - 1 && valuesMap[firstBin] === 0) return inputsList.join(' + ');
        if (onesCount === rows - 1 && valuesMap[lastBin] === 0) return `(${inputsList.join('')})'`;
        if (onesCount === 1 && valuesMap[firstBin] === 1) return `(${inputsList.join(' + ')})'`;
        if (isXOR) return inputsList.join(' ⊕ ');
        if (isXNOR) return inputsList.join(' ⊙ ');

        const minterms = [];
        for (let i = 0; i < Math.pow(2, inputsCount); i++) {
          const bin = i.toString(2).padStart(inputsCount, '0');
          if (valuesMap[bin] === 1) minterms.push(bin);
        }

        let implicants = [...minterms];
        let primeImplicants = new Set();
        let hasCombinations = true;

        while (hasCombinations) {
            hasCombinations = false;
            let nextImplicants = new Set();
            let used = new Set();

            for (let i = 0; i < implicants.length; i++) {
                for (let j = i + 1; j < implicants.length; j++) {
                    let diffCount = 0;
                    let diffIdx = -1;
                    for (let k = 0; k < inputsCount; k++) {
                        if (implicants[i][k] !== implicants[j][k]) {
                            diffCount++;
                            diffIdx = k;
                        }
                    }
                    if (diffCount === 1) {
                        let combinedStr = implicants[i].substring(0, diffIdx) + '-' + implicants[i].substring(diffIdx + 1);
                        nextImplicants.add(combinedStr);
                        used.add(implicants[i]);
                        used.add(implicants[j]);
                        hasCombinations = true;
                    }
                }
            }
            for (let imp of implicants) {
                if (!used.has(imp)) primeImplicants.add(imp);
            }
            implicants = Array.from(nextImplicants);
        }
        for (let imp of implicants) {
            primeImplicants.add(imp);
        }

        let uncovered = new Set(minterms);
        let finalCover = [];
        let piArray = Array.from(primeImplicants).sort((a, b) => (b.match(/-/g) || []).length - (a.match(/-/g) || []).length);

        for (let pi of piArray) {
            let covers = minterms.filter(m => {
                for(let i=0; i < inputsCount; i++) {
                    if (pi[i] !== '-' && pi[i] !== m[i]) return false;
                }
                return true;
            });

            if (covers.some(m => uncovered.has(m))) {
                finalCover.push(pi);
                covers.forEach(m => uncovered.delete(m));
            }
        }

        const terms = finalCover.map(pi => {
            const parts = [];
            for (let i = 0; i < inputsCount; i++) {
                if (pi[i] === '1') parts.push(inputsList[i]);
                else if (pi[i] === '0') parts.push(`${inputsList[i]}'`);
            }
            return parts.join('');
        });

        return terms.sort().join(' + ');
      };

      const handleExtractLogic = (type) => {
        const tt = (state.truthTables || []).find(t => t.id === parseInt(selectedTtId));
        if (!tt) return toast('NO MODULE SELECTED', 'warning');
        
        const equation = generateBooleanEquation(tt.inputs, tt.outputs[selectedTtOutIdx].values);
        
        if (type === 'eq') {
          setNewFormula({ title: `${tt.name} - ${tt.outputs[selectedTtOutIdx].name}`, code: equation, tags: 'Equation' });
          toast('LOGIC EQUATION EXTRACTED', 'info');
        } else if (type === 'gates') {
          setNewFormula({ title: `${tt.name} - ${tt.outputs[selectedTtOutIdx].name} GATES`, code: equation, tags: 'Gates' });
          toast('LOGIC SCHEMATIC EXTRACTED', 'info');
        }
      };

      const executeCompile = () => {
        if(!newFormula.title || !newFormula.code) {
          toast('INCOMPLETE COMPILER ARGUMENTS', 'warning');
          return;
        }
        setIsCompiling(true);
        setTerminalLogs(["> INITIALIZING " + (newFormula.tags === 'Gates' ? 'SCHEMATIC SYNTHESIZER' : 'COMPILER DAEMON') + "..."]);
        
        setTimeout(() => setTerminalLogs(prev => [...prev, "> ALLOCATING MEMORY..."]), 400);
        setTimeout(() => setTerminalLogs(prev => [...prev, "> PARSING LOGIC AST..."]), 800);
        setTimeout(() => setTerminalLogs(prev => [...prev, "> SYNTAX VALID. GENERATING..."]), 1400);
        setTimeout(() => setTerminalLogs(prev => [...prev, "> SECURING TO VAULT..."]), 2000);

        setTimeout(() => {
          dispatch({ type: 'ADD_FORMULA', payload: { id: Date.now(), title: newFormula.title, code: newFormula.code, tags: newFormula.tags || 'Equation' }});
          setNewFormula({ title: '', code: '', tags: 'Equation' });
          setSelectedTtId('');
          toast('SUCCESSFULLY SYNTHESIZED AND SECURED', 'success');
          setIsCompiling(false);
          setTerminalLogs([]);
        }, 2500);
      };

      return (
        <div className="flex flex-col h-full bg-[var(--paper)] border-2 border-[var(--ink)] relative shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-10 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">
            <div>
              <div className="label">§VI</div>
              <h2 className="text-3xl sm:text-4xl">CONSOLE</h2>
            </div>
          </div>

          <div className="flex border-b-2 border-[var(--ink)] shrink-0">
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 py-2 sm:py-3 px-1 sm:px-3 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold transition-colors ${activeTab === 'inventory' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--card)] text-[var(--ink)] border-r-2 border-[var(--ink)] hover:bg-[var(--paper)]'}`}>HARDWARE</button>
            <button onClick={() => setActiveTab('logic')} className={`flex-1 py-2 sm:py-3 px-1 sm:px-3 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold transition-colors ${activeTab === 'logic' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--card)] text-[var(--ink)] border-r-2 border-[var(--ink)] hover:bg-[var(--paper)]'}`}>LOGIC</button>
            <button onClick={() => setActiveTab('formulas')} className={`flex-1 py-2 sm:py-3 px-1 sm:px-3 font-sans text-[10px] sm:text-[12px] uppercase tracking-wide sm:tracking-widest font-bold transition-colors ${activeTab === 'formulas' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-[var(--card)] text-[var(--ink)] hover:bg-[var(--paper)]'}`}>SYNTHESIS</button>
          </div>

          <div className="flex flex-col p-2 sm:p-4 overflow-y-auto custom-scrollbar min-h-[300px]">
            {/* INVENTORY TAB */}
            {activeTab === 'inventory' && (
              <div className="flex flex-col gap-4 sm:gap-6">
                <div className="flex justify-between items-center px-2">
                   <span className="label !mb-0 font-bold text-[10px] sm:text-xs">PHYSICAL INVENTORY LEDGER</span>
                   <button onClick={() => setShowInvForm(!showInvForm)} className="btn-outline !py-1 sm:!py-2 !px-3 sm:!px-4 text-[10px] sm:text-xs">{showInvForm ? '✕ CANCEL' : '+ NEW ENTRY'}</button>
                </div>
                {showInvForm && (
                  <div className="panel p-3 sm:p-4 animate-in fade-in border-stamped bg-[var(--card)] mx-2">
                    <input type="text" placeholder="COMPONENT DESIGNATION" className="input w-full mb-3 sm:mb-4" value={newInv.name} onChange={e => setNewInv({ ...newInv, name: e.target.value })} />
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                      <select className="input" value={newInv.category} onChange={e => setNewInv({ ...newInv, category: e.target.value })}>
                        <option>IC</option><option>Board</option><option>Wire</option><option>Resistor</option><option>Capacitor</option><option>Other</option>
                      </select>
                      <input type="number" placeholder="QTY" className="input" value={newInv.quantity} onChange={e => setNewInv({ ...newInv, quantity: parseInt(e.target.value)||0 })} />
                    </div>
                    <input type="text" placeholder="SPECIFICATIONS" className="input w-full mb-4 sm:mb-6" value={newInv.specs} onChange={e => setNewInv({ ...newInv, specs: e.target.value })} />
                    <button onClick={handleAddInv} className="btn-stamp w-full !py-2 sm:!py-3">COMMIT RECORD</button>
                  </div>
                )}
                <div className="ledger border-t border-[var(--ink)] mt-2">
                  <div className="flex justify-between px-2 py-3 border-b border-[var(--ink)] text-[10px] sm:text-xs uppercase tracking-widest text-[var(--muted-fg)] font-bold">
                     <div className="flex-1">DESIGNATION / SPEC</div>
                     <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                       <div className="w-20 sm:w-24 text-center">QTY</div>
                       <div className="w-6 sm:w-8 text-center"></div>
                     </div>
                  </div>
                  {(state.inventory || []).map(item => (
                    <div key={item.id} className={`flex justify-between items-center px-2 py-3 hover:bg-[var(--card)] transition-colors border-b border-dashed border-[color-mix(in_oklab,var(--ink)_40%,transparent)] gap-2 sm:gap-4 ${item.quantity <= item.minStock ? 'status-warn font-bold' : ''}`}>
                      <div className="flex-1 min-w-0 pr-2">
                        <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                          <span className="truncate uppercase text-[12px] sm:text-[14px]">{item.name} {item.quantity <= item.minStock && ' [LOW]'}</span>
                          <span className="border border-current px-1 text-[9px] sm:text-[10px] shrink-0 font-normal w-fit">{item.category}</span>
                        </div>
                        <div className="text-[10px] sm:text-[11px] text-[var(--muted-fg)] uppercase font-normal mt-1 truncate">{item.specs}</div>
                      </div>
                      <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                        <div className="flex items-center w-20 sm:w-24 justify-center">
                           <button onClick={() => updateInvQty(item.id, item.quantity, -1)} className="btn-square w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center hover:bg-[var(--ink)] hover:text-[var(--paper)] transition-colors">-</button>
                           <span className="w-8 text-center font-bold text-sm sm:text-lg">{item.quantity}</span>
                           <button onClick={() => updateInvQty(item.id, item.quantity, 1)} className="btn-square w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center hover:bg-[var(--ink)] hover:text-[var(--paper)] transition-colors">+</button>
                        </div>
                        <button onClick={() => dispatch({ type: 'DELETE_INVENTORY', payload: item.id })} className="w-6 sm:w-8 btn-ghost !text-[var(--rust)] font-bold text-sm sm:text-base text-center p-0 m-0 border-none">✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* LOGIC TAB */}
            {activeTab === 'logic' && (
              <div className="flex flex-col gap-4 sm:gap-6">
                 <div className="panel p-0 bg-[var(--card)] border-stamped">
                   <div className="head bg-[var(--paper)] flex-col sm:flex-row items-start sm:items-center gap-3">
                     <span className="label !mb-0 text-[10px] sm:text-xs">INTERACTIVE TABLE BUILDER</span>
                     <div className="flex items-center gap-2 sm:gap-3">
                       <span className="label !mb-0 text-[10px] sm:text-xs">INPUTS:</span>
                       {[2, 3, 4].map(num => (
                         <button key={num} onClick={() => { setTtInputs(num); setTtOutputs([{name:'F', values:{}}]); }} className={`btn-square w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center font-bold text-sm ${ttInputs === num ? 'bg-[var(--ink)] text-[var(--paper)]' : 'hover:bg-[var(--paper)]'}`}>{num}</button>
                       ))}
                     </div>
                   </div>
                   <div className="overflow-x-auto p-2 sm:p-4 border-b-2 border-[var(--ink)]">
                     <table className="table w-full text-center border-collapse border border-[var(--ink)] bg-[var(--paper)]">
                       <thead>
                         <tr className="bg-[var(--ink)] text-[var(--paper)]">
                           {Array.from({length: ttInputs}).map((_, i) => <th key={i} className="border-r border-[var(--paper)] border-b-2 font-bold text-[12px] sm:text-[14px] !text-[var(--paper)] p-2">{String.fromCharCode(65 + i)}</th>)}
                           {ttOutputs.map((out, idx) => (
                             <th key={idx} className="border-r border-[var(--paper)] border-b-2 p-1 sm:p-2 min-w-[60px]">
                               <input type="text" value={out.name} onChange={(e) => setTtOutputs(ttOutputs.map((o,i) => i===idx ? {...o, name:e.target.value} : o))} className="bg-transparent w-full text-center outline-none uppercase font-bold text-[var(--paper)] text-[12px] sm:text-[14px]" />
                             </th>
                           ))}
                           <th className="border-b-2 border-[var(--paper)] w-16 sm:w-20 p-2">
                             <div className="flex justify-center gap-2 sm:gap-3">
                               <button onClick={() => setTtOutputs([...ttOutputs, { name: `F${ttOutputs.length + 1}`, values: {} }])} className="active:scale-90 transition-transform font-bold text-base sm:text-lg" title="Add Column">+</button>
                               {ttOutputs.length > 1 && <button onClick={() => setTtOutputs(ttOutputs.slice(0, -1))} className="active:scale-90 transition-transform font-bold text-base sm:text-lg" title="Remove Column">-</button>}
                             </div>
                           </th>
                         </tr>
                       </thead>
                       <tbody>
                         {generateTTMatrix().map((rowBinary, rowIdx) => (
                           <tr key={rowIdx} className="hover:bg-[var(--card)] border-b border-dashed border-[var(--ink)]">
                             {rowBinary.split('').map((val, cellIdx) => <td key={cellIdx} className="border-r border-[var(--ink)] opacity-70 p-2 text-[12px] sm:text-[14px]">{val}</td>)}
                             {ttOutputs.map((out, outIdx) => (
                               <td key={outIdx} className={`border-r border-[var(--ink)] cursor-pointer font-bold p-2 text-[12px] sm:text-[14px] transition-colors ${out.values[rowBinary] === 1 ? 'text-[var(--stamp)] bg-[oklch(0.58_0.19_45_/_0.1)]' : 'opacity-40'}`} onClick={() => toggleTtOutput(outIdx, rowBinary)}>{out.values[rowBinary] || 0}</td>
                             ))}
                             <td className="p-2"></td>
                           </tr>
                         ))}
                       </tbody>
                     </table>
                   </div>
                   <div className="p-3 sm:p-4 flex flex-col sm:flex-row gap-2 sm:gap-3 bg-[var(--paper)]">
                     <input type="text" placeholder="TABLE IDENTIFIER (E.G. ADDER)" className="input w-full sm:flex-1 min-w-[200px]" value={ttName} onChange={e => setTtName(e.target.value)} />
                     <button onClick={saveTruthTable} className="btn-primary w-full sm:w-auto !px-6 flex-1 min-w-[120px]">↳ SAVE TABLE</button>
                   </div>
                 </div>
                 {(state.truthTables || []).length > 0 && (
                   <div className="flex flex-col gap-2 sm:gap-3 mt-2 sm:mt-4">
                     <span className="label text-[10px] sm:text-xs">SAVED LOGIC MODULES</span>
                     {(state.truthTables || []).map(tt => (
                       <div key={tt.id} className="panel px-3 sm:px-4 py-2 sm:py-3 flex flex-col sm:flex-row justify-between items-start sm:items-center group bg-[var(--paper)] hover:bg-[var(--card)] transition-colors gap-2">
                         <span className="font-bold uppercase tracking-widest text-[var(--stamp)] text-[12px] sm:text-[14px] break-words">{tt.name}</span>
                         <div className="flex items-center justify-between w-full sm:w-auto gap-4 sm:gap-6">
                           <span className="label !mb-0 text-[9px] sm:text-[11px]">{tt.inputs} IN / {tt.outputs.length} OUT</span>
                           <button onClick={() => dispatch({ type: 'DELETE_TRUTH_TABLE', payload: tt.id })} className="btn-ghost !text-[var(--rust)] font-bold text-sm sm:text-base">✕</button>
                         </div>
                       </div>
                     ))}
                   </div>
                 )}
              </div>
            )}

            {/* FORMULAS TAB */}
            {activeTab === 'formulas' && (
              <div className="flex flex-col gap-4 sm:gap-6">
                
                {/* --- RETRO TERMINAL BLOCK --- */}
                <div className="crt-box scanlines !p-4 sm:!p-6 animate-crt-flicker">
                   <div className="flex items-center gap-2 mb-4 sm:mb-6 text-lg sm:text-xl font-raster text-[var(--stamp)]">
                      <span>root@eva-sys:~/compiler$</span>

              </div>
            )}
          </div>
        </div>
      );
    };

    function App() {
      const [state, dispatch] = useReducer(matrixReducer, DEFAULT_STATE);
      const [isLoaded, setIsLoaded] = useState(false);
      const [showSettings, setShowSettings] = useState(false);

      useEffect(() => {
        const saved = localStorage.getItem('ascend_matrix_tva_state_v3');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            dispatch({ type: 'IMPORT_STATE', payload: parsed });
          } catch (e) {
            console.error('Failed to parse saved matrix state', e);
          }
        }
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (isLoaded) {
          localStorage.setItem('ascend_matrix_tva_state_v3', JSON.stringify(state));
          
          if (state.settings?.theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
        }
      }, [state, isLoaded]);

      const totalTasks = (state.tasks || []).length;
      const compTasks = (state.tasks || []).filter(t => t.status === 'done').length;
      
      const scanlinesActive = state.settings?.scanlinesEnabled !== false;

      const getAccentColor = (color) => {
        switch(color) {
          case 'cyan': return 'oklch(0.65 0.15 220)';
          case 'green': return 'oklch(0.60 0.18 140)';
          case 'magenta': return 'oklch(0.55 0.22 330)';
          case 'orange':
          default: return 'oklch(0.58 0.19 45)';

      const stampColor = getAccentColor(state.settings?.accentColor);

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVA - Ascend Engineering Matrix</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for translating JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useReducer, createContext, useContext } = React;

    // --- Global State & Persistence ---
    const DEFAULT_STATE = {
      tasks: [
        { id: 1, title: "Debug Java Thread Sync", weight: 8, status: "todo", epic: "Hotel Mgmt", isToday: true, syllabusId: null },
        { id: 2, title: "Draft Conic Sections", weight: 3, status: "todo", epic: "Math 301", isToday: false, syllabusId: 1 },
        { id: 3, title: "Wire 3-bit Adder", weight: 9, status: "done", epic: "Digital Logic", isToday: true, syllabusId: 2 }
      ],
      inventory: [
        { id: 1, name: "Breadboard (Large)", category: "Board", quantity: 2, minStock: 1, specs: "830 Tie Points" },
        { id: 2, name: "74HC08 Quad AND", category: "IC", quantity: 5, minStock: 10, specs: "DIP-14" },
        { id: 3, name: "Jumper Wires (M-M)", category: "Wire", quantity: 45, minStock: 20, specs: "Assorted Lengths" }
      ],
      syllabus: [
        { id: 1, course: "MTH 301", deliverable: "Conic Sections Presentation", deadline: "2026-05-20", type: "Presentation", status: "active" },
        { id: 2, course: "ENG 202", deliverable: "3-Bit Signed Calculator", deadline: "2026-06-01", type: "Lab Build", status: "active" }
      ],
      formulas: [
        { id: 1, title: "Euler's Identity", code: "e^(i*pi) + 1 = 0", tags: "Math" },
        { id: 2, title: "Ohm's Law", code: "V = I * R", tags: "Physics" }
      ],
      truthTables: [],
      incidents: [
        { id: 1, title: "NullPointerException in AuthModule", description: "Socket connection drops unexpectedly during payload transfer.", status: "active", steps: [{id: 101, text: "Isolate packet header", done: true}, {id: 102, text: "Verify token sync", done: false}] },
        { id: 2, title: "VCC Short to Ground", description: "Breadboard rail overheating near 74HC08.", status: "pruned", steps: [{id: 201, text: "Check IC orientation", done: true}, {id: 202, text: "Meter continuity", done: true}] }
      ],
      stats: { clearancePoints: 0, efficiencyYield: 100 }
    };

    function matrixReducer(state, action) {
      switch (action.type) {
        case 'ADD_TASK': return { ...state, tasks: [...state.tasks, action.payload] };
        case 'UPDATE_TASK': return { ...state, tasks: state.tasks.map(t => t.id === action.payload.id ? { ...t, ...action.payload } : t) };
        case 'TOGGLE_TASK_STATUS': return { ...state, tasks: state.tasks.map(t => t.id === action.payload ? { ...t, status: t.status === 'todo' ? 'done' : 'todo' } : t) };
        case 'TOGGLE_TASK_TODAY': return { ...state, tasks: state.tasks.map(t => t.id === action.payload ? { ...t, isToday: !t.isToday } : t) };
        case 'DELETE_TASK': return { ...state, tasks: state.tasks.filter(t => t.id !== action.payload) };
        case 'ADD_INVENTORY': return { ...state, inventory: [...state.inventory, action.payload] };
        case 'UPDATE_INVENTORY': return { ...state, inventory: state.inventory.map(i => i.id === action.payload.id ? { ...i, ...action.payload } : i) };
        case 'DELETE_INVENTORY': return { ...state, inventory: state.inventory.filter(i => i.id !== action.payload) };
        case 'ADD_SYLLABUS': return { ...state, syllabus: [...state.syllabus, action.payload] };
        case 'DELETE_SYLLABUS': 
          const untetheredTasks = state.tasks.map(t => t.syllabusId === action.payload ? { ...t, syllabusId: null } : t);
          return { ...state, syllabus: state.syllabus.filter(s => s.id !== action.payload), tasks: untetheredTasks };
        case 'SPAWN_EPIC': return { ...state, tasks: [...state.tasks, ...action.payload] };
        case 'SAVE_TRUTH_TABLE': return { ...state, truthTables: [...state.truthTables, action.payload] };
        case 'DELETE_TRUTH_TABLE': return { ...state, truthTables: state.truthTables.filter(tt => tt.id !== action.payload) };
        case 'ADD_FORMULA': return { ...state, formulas: [...state.formulas, action.payload] };
        case 'DELETE_FORMULA': return { ...state, formulas: state.formulas.filter(f => f.id !== action.payload) };
        // Incident Reducers
        case 'ADD_INCIDENT': return { ...state, incidents: [...(state.incidents || []), action.payload] };
        case 'DELETE_INCIDENT': return { ...state, incidents: state.incidents.filter(i => i.id !== action.payload) };
        case 'PRUNE_INCIDENT': return { ...state, incidents: state.incidents.map(i => i.id === action.payload ? { ...i, status: 'pruned' } : i) };
        case 'ADD_INCIDENT_STEP': return { ...state, incidents: state.incidents.map(i => i.id === action.payload.incidentId ? { ...i, steps: [...i.steps, action.payload.step] } : i) };
        case 'TOGGLE_INCIDENT_STEP': return { ...state, incidents: state.incidents.map(i => i.id === action.payload.incidentId ? { ...i, steps: i.steps.map(s => s.id === action.payload.stepId ? { ...s, done: !s.done } : s) } : i) };
        case 'ADD_CLEARANCE_POINTS': return { ...state, stats: { ...(state.stats || {}), clearancePoints: ((state.stats || {}).clearancePoints || 0) + action.payload } };
        case 'IMPORT_STATE': return action.payload;
        default: return state;
      }
    }

    const MatrixContext = createContext();
    const ToastContext = createContext();

    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);

      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };

      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-4 pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} className="panel border-stamped p-4 flex items-center gap-4 animate-in fade-in slide-in-from-right-5 bg-[var(--card)] pointer-events-auto" style={{ minWidth: '320px' }}>
                <div className={`status-dot ${t.type === 'warning' || t.type === 'success' ? 'blink' : ''}`} style={{ background: t.type === 'warning' ? 'var(--stamp)' : 'var(--ink)' }}></div>
                <span className="label !mb-0 text-sm tracking-widest" style={{ color: t.type === 'warning' ? 'var(--stamp)' : 'var(--ink)' }}>
                  {t.type === 'warning' ? '⚠ WARNING' : t.type === 'success' ? '✓ LOGGED' : '◆ NOTICE'}: {t.message}
                </span>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };

    // ----------------------------------------------------
    // NEW MODULE: THE TEMPORAL LOOM (BRANCHING EDITION)
    // ----------------------------------------------------
    const TemporalLoom = () => {
      const { state, dispatch } = useContext(MatrixContext);
      
      const timelineNodes = [];
      const deadlines = [...new Set(state.syllabus.filter(s => s.deadline).map(s => s.deadline))].sort();

      deadlines.forEach(date => {
        const coursesDue = state.syllabus.filter(s => s.deadline === date);
        let highComplexityTasks = 0;
        let totalLoad = 0;

        const coursesWithTasks = coursesDue.map(course => {
          const linked = state.tasks.filter(t => t.syllabusId === course.id);
          totalLoad += linked.reduce((sum, t) => sum + t.weight, 0);
          highComplexityTasks += linked.filter(t => t.weight >= 8).length;
          return { ...course, linkedTasks: linked };
        });

        const isCollision = highComplexityTasks >= 3;
        timelineNodes.push({ date, courses: coursesWithTasks, highComplexityTasks, totalLoad, isCollision });
      });

      // Layout constants
      const TIMELINE_Y = 250;
      const NODE_SPACING = 340;

      // Compute geometric positions for SVG overlay mapping
      const nodesLayout = timelineNodes.map((node, i) => {
        const x = 160 + i * NODE_SPACING;
        // Undulate the timeline slightly up and down
        const y = TIMELINE_Y + (i % 2 === 0 ? -30 : 30);
        
        const allTasks = [];
        node.courses.forEach(c => allTasks.push(...c.linkedTasks));
        
        // Calculate branching coordinates for tasks
        const tasksWithPos = allTasks.map((t, idx) => {
           const isUp = idx % 2 === 0;
           const k = Math.floor(idx / 2);
           const taskX = x + 35 + (k * 20); // Step tasks forward incrementally
           const taskY = isUp ? y - 70 - (k * 42) : y + 70 + (k * 42); // Step tasks outward
           return { ...t, x: taskX, y: taskY, isUp };
        });
        
        return { ...node, x, y, tasksWithPos };
      });

      // Construct continuous SVG curve for the central "Sacred Timeline"
      let sacredPath = `M 0 ${TIMELINE_Y}`;
      if (nodesLayout.length > 0) {
         const first = nodesLayout[0];
         sacredPath += ` C ${first.x / 2} ${TIMELINE_Y}, ${first.x / 2} ${first.y}, ${first.x} ${first.y}`;
         for (let i = 0; i < nodesLayout.length - 1; i++) {
            const curr = nodesLayout[i];
            const next = nodesLayout[i+1];
            const midX = (curr.x + next.x) / 2;
            sacredPath += ` C ${midX} ${curr.y}, ${midX} ${next.y}, ${next.x} ${next.y}`;
         }
         const last = nodesLayout[nodesLayout.length - 1];
         sacredPath += ` C ${last.x + 100} ${last.y}, ${last.x + 100} ${TIMELINE_Y}, ${last.x + 400} ${TIMELINE_Y}`;
      }

      const totalWidth = Math.max(1200, (nodesLayout.length * NODE_SPACING) + 400);

      return (
        <div className="flex flex-col bg-[var(--paper)] border-2 border-[var(--ink)] relative w-full h-[520px] overflow-hidden shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-30 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">
            <div>
              <div className="label">§IV</div>
              <h2 className="text-4xl">TEMPORAL LOOM</h2>
            </div>
            <span className="label !mb-0 text-[10px] text-[var(--stamp)] animate-pulse">◆ MONITORING TIMELINE BRANCHES</span>
          </div>
          
          <div className="flex-1 relative overflow-x-auto overflow-y-hidden custom-scrollbar bg-[var(--crt-bg)]" style={{ scrollBehavior: 'smooth' }}>
            
            {/* The Unified SVG Circuit Canvas */}
            <svg className="absolute top-0 left-0 pointer-events-none z-0" style={{ width: totalWidth, height: '100%' }}>
               <defs>
                 <filter id="loom-glow" x="-20%" y="-20%" width="140%" height="140%">
                   <feGaussianBlur stdDeviation="4" result="blur" />
                   <feMerge>
                     <feMergeNode in="blur"/>
                     <feMergeNode in="SourceGraphic"/>
                   </feMerge>
                 </filter>
                 <filter id="branch-glow" x="-20%" y="-20%" width="140%" height="140%">
                   <feGaussianBlur stdDeviation="2" result="blur" />
                   <feMerge>
                     <feMergeNode in="blur"/>
                     <feMergeNode in="SourceGraphic"/>
                   </feMerge>
                 </filter>
                 <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
                   <feGaussianBlur stdDeviation="6" result="blur" />
                   <feComponentTransfer in="blur" result="glow1">
                      <feFuncA type="linear" slope="3"/>
                   </feComponentTransfer>
                   <feMerge>
                     <feMergeNode in="glow1"/>
                     <feMergeNode in="SourceGraphic"/>
                   </feMerge>
                 </filter>
               </defs>

               {/* Grid Texture */}
               <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                 <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--paper)" strokeWidth="0.5" opacity="0.05" />
               </pattern>
               <rect width="100%" height="100%" fill="url(#grid)" />

               {/* Deep Space Background Core Line */}
               <path d={sacredPath} fill="none" stroke="var(--paper)" strokeWidth="12" opacity="0.15" filter="url(#loom-glow)" />
               <path d={sacredPath} fill="none" stroke="var(--paper)" strokeWidth="2" strokeDasharray="12 12" className="animate-flow" />

               {/* Render Task Branches Extruding from Nodes */}
               {nodesLayout.map(n => n.tasksWithPos.map(t => {
                 const isDone = t.status === 'done';
                 const color = isDone ? 'var(--muted-fg)' : 'var(--stamp)';
                 const opacity = isDone ? '0.3' : '0.9';
                 const strokeWidth = isDone ? "2" : "3";
                 return (
                   <path 
                     key={t.id} 
                     d={`M ${n.x} ${n.y} C ${n.x + 20} ${n.y}, ${t.x - 20} ${t.y}, ${t.x} ${t.y}`} 
                     fill="none" 
                     stroke={color} 
                     strokeWidth={strokeWidth} 
                     opacity={opacity}
                     strokeDasharray={isDone ? "6 6" : "none"}
                     filter={!isDone ? "url(#branch-glow)" : "none"}
                   />
                 );
               }))}

               {/* Aggressive Red Fractals for Nexus Collisions */}
               {nodesLayout.filter(n => n.isCollision).map((n, i) => (
                 <g key={i}>
                   <path d={`M ${n.x} ${n.y} Q ${n.x - 50} ${n.y - 100}, ${n.x + 30} ${n.y - 180}`} fill="none" stroke="var(--destructive)" strokeWidth="4" filter="url(#nexus-glow)" opacity="0.8" strokeDasharray="15 10" className="blink" />
                   <path d={`M ${n.x} ${n.y} Q ${n.x + 80} ${n.y + 90}, ${n.x - 20} ${n.y + 160}`} fill="none" stroke="var(--destructive)" strokeWidth="3" filter="url(#nexus-glow)" opacity="0.6" strokeDasharray="10 8" className="blink" />
                   <circle cx={n.x} cy={n.y} r="18" fill="transparent" stroke="var(--destructive)" strokeWidth="2" filter="url(#nexus-glow)" className="blink" />
                 </g>
               ))}
            </svg>

            {/* HTML Component Overlays (Nodes & Tasks) */}
            <div className="absolute top-0 left-0 h-full pointer-events-auto z-10" style={{ width: totalWidth }}>
               {nodesLayout.length === 0 && (
                  <div className="flex h-full w-full items-center justify-center text-[var(--crt-fg)] opacity-50 uppercase tracking-widest font-sans">
                     [ TIMELINE SECURE. NO DEADLINES ANCHORED. ]
                  </div>
               )}
               {nodesLayout.map(n => (
                  <React.Fragment key={n.date}>
                     {/* The Main Node Orb & Descriptor Block */}
                     <div className="absolute transform -translate-x-1/2 -translate-y-1/2 z-20" style={{ left: n.x, top: n.y }}>
                        <div className={`w-8 h-8 rounded-full border-[3px] flex items-center justify-center m-auto ${n.isCollision ? 'border-[var(--destructive)] bg-[var(--crt-bg)] shadow-[0_0_20px_var(--destructive)] blink' : 'border-[var(--paper)] bg-[var(--ink)] shadow-[0_0_15px_rgba(255,255,255,0.2)]'}`}>
                          <div className={`w-3 h-3 rounded-full ${n.isCollision ? 'bg-[var(--destructive)]' : 'bg-[var(--paper)]'}`}></div>
                        </div>
                        
                        <div className="absolute top-12 left-1/2 transform -translate-x-1/2 bg-[var(--card)] border border-[var(--ink)] py-1 px-3 whitespace-nowrap flex flex-col items-center z-30 shadow-[2px_2px_0_0_var(--ink)]">
                           <span className={`font-bold text-[13px] uppercase ${n.isCollision ? 'text-[var(--destructive)]' : 'text-[var(--ink)]'}`}>{n.date}</span>
                           <span className="text-[9px] uppercase tracking-widest opacity-80">{n.courses.map(c=>c.course).join(' + ')}</span>
                        </div>
                     </div>

                     {/* The Task Branch Terminals */}
                     {n.tasksWithPos.map(t => {
                        const isDone = t.status === 'done';
                        return (
                          <div 
                            key={t.id} 
                            className={`absolute transform -translate-y-1/2 flex flex-col justify-center cursor-pointer transition-all border-l-[3px] p-2 z-30 ${isDone ? 'bg-[var(--crt-bg)] border-[var(--muted-fg)] opacity-60' : 'bg-[var(--card)] border-[var(--stamp)] shadow-[4px_4px_0_0_rgba(0,0,0,0.5)] hover:-translate-y-[calc(50%+2px)] hover:-translate-x-[2px]'}`} 
                            style={{ left: t.x + 5, top: t.y, width: '180px' }}
                            onClick={() => dispatch({ type: 'TOGGLE_TASK_STATUS', payload: t.id })}
                          >
                             <div className="flex justify-between items-start mb-1">
                               <span className={`text-[13px] font-bold shrink-0 ${isDone ? 'text-[var(--muted-fg)]' : 'text-[var(--stamp)]'}`}>
                                 {isDone ? '[✕]' : '[ ]'}
                               </span>
                               <span className="text-[9px] border border-current px-1 font-bold">W:{t.weight}</span>
                             </div>
                             <span className={`text-[11px] uppercase font-bold tracking-wider leading-snug line-clamp-2 ${isDone ? 'line-through text-[var(--muted-fg)]' : 'text-[var(--ink)]'}`} title={t.title}>
                               {t.title}
                             </span>
                          </div>
                        );
                     })}
                  </React.Fragment>
               ))}
            </div>

          </div>
        </div>
      );
    };

    // ----------------------------------------------------
    // NEW MODULE: NEXUS INCIDENT LEDGER
    // ----------------------------------------------------
    const NexusLedger = () => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);
      const [newIncident, setNewIncident] = useState({ title: '', description: '' });
      const [newStepText, setNewStepText] = useState({});
      const [viewPruned, setViewPruned] = useState(false);

      const incidents = state.incidents || [];
      const activeIncidents = incidents.filter(i => i.status === 'active');
      const prunedIncidents = incidents.filter(i => i.status === 'pruned');
      const displayList = viewPruned ? prunedIncidents : activeIncidents;

      const logIncident = () => {
        if (newIncident.title) {
          dispatch({ type: 'ADD_INCIDENT', payload: { id: Date.now(), ...newIncident, status: 'active', steps: [] } });
          setNewIncident({ title: '', description: '' });
          toast('NEXUS EVENT LOGGED. VARIANCE THREAT DETECTED.', 'warning');
        } else {
          toast('INCIDENT IDENTIFIER REQUIRED.', 'info');
        }
      };

      const addStep = (incidentId) => {
        if (newStepText[incidentId]) {
          dispatch({ type: 'ADD_INCIDENT_STEP', payload: { incidentId, step: { id: Date.now(), text: newStepText[incidentId], done: false } } });
          setNewStepText({ ...newStepText, [incidentId]: '' });
        }
      };

      return (
        <div className="flex flex-col h-full bg-[var(--paper)] border-2 border-[var(--ink)] relative shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-10 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">
            <div>
              <div className="label">§V</div>
              <h2 className="text-4xl">NEXUS INCIDENTS</h2>
            </div>
            <div className="flex border-2 border-[var(--ink)]">
              <button onClick={() => setViewPruned(false)} className={`px-4 py-2 font-sans text-[12px] uppercase tracking-widest font-bold transition-colors ${!viewPruned ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'}`}>
                ACTIVE [{activeIncidents.length}]
              </button>
              <button onClick={() => setViewPruned(true)} className={`px-4 py-2 font-sans text-[12px] uppercase tracking-widest font-bold border-l-2 border-[var(--ink)] transition-colors ${viewPruned ? 'bg-[var(--destructive)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'}`}>
                ARCHIVES [{prunedIncidents.length}]
              </button>
            </div>
          </div>

          <div className="flex-1 flex flex-col p-4 overflow-y-auto custom-scrollbar">
            {!viewPruned && (
              <div className="panel p-4 mb-6 bg-[var(--card)] border-stamped">
                <span className="label !text-[var(--destructive)] !font-bold mb-3">REPORT TIMELINE ANOMALY</span>
                <input type="text" placeholder="BUG IDENTIFIER (E.G. NULL POINTER)" className="input w-full mb-3" value={newIncident.title} onChange={e => setNewIncident({...newIncident, title: e.target.value})} />
                <textarea placeholder="DESCRIBE THE VARIANCE..." className="input w-full h-20 py-2 mb-3 resize-none" value={newIncident.description} onChange={e => setNewIncident({...newIncident, description: e.target.value})} />
                <button onClick={logIncident} className="btn-primary w-full !bg-[var(--destructive)] hover:!bg-[var(--ink)]">LOG NEXUS EVENT ↳</button>
              </div>
            )}

            <div className="flex flex-col gap-4">
              {displayList.length === 0 ? (
                 <div className="text-center p-8 opacity-60">
                   <span className="font-sans uppercase tracking-widest text-sm">[ TIMELINE SECURE. NO EVENTS FOUND. ]</span>
                 </div>
              ) : displayList.map(incident => {
                const isPruned = incident.status === 'pruned';
                const progress = incident.steps.length > 0 ? Math.round((incident.steps.filter(s=>s.done).length / incident.steps.length) * 100) : 0;
                
                return (
                  <div key={incident.id} className="panel bg-[var(--paper)] relative overflow-hidden">
                    {isPruned && (
                      <div className="absolute inset-0 z-0 flex items-center justify-center pointer-events-none opacity-20">
                         <div className="tva-stamp !text-[6rem] !border-[8px] rotate-[-15deg] !text-[var(--destructive)] !border-[var(--destructive)]">PRUNED</div>
                      </div>
                    )}
                    <div className="head relative z-10 bg-[var(--card)]">
                      <span className={`font-bold text-[14px] ${isPruned ? 'line-through opacity-70' : 'text-[var(--destructive)]'}`}>{incident.title}</span>
                      <div className="flex gap-4">
                        {!isPruned && (
                          <button onClick={() => {
                            dispatch({ type: 'PRUNE_INCIDENT', payload: incident.id });
                            toast('INCIDENT PRUNED. TIMELINE RESTORED.', 'success');
                          }} className="btn-outline !py-1 !px-3 !text-[10px] hover:!bg-[var(--destructive)] hover:!border-[var(--destructive)]" title="Mark Resolved">PRUNE EVENT</button>
                        )}
                        <button onClick={() => dispatch({ type: 'DELETE_INCIDENT', payload: incident.id })} className="btn-ghost !text-[var(--rust)] font-bold">✕</button>
                      </div>
                    </div>
                    <div className="body relative z-10 border-t border-[var(--ink)]">
                      <p className="font-sans text-[13px] opacity-80 uppercase leading-relaxed mb-4">{incident.description}</p>
                      
                      <div className="bg-[var(--card)] border border-[var(--ink)] border-dashed p-4">
                        <span className="label text-[10px] !mb-3">PRUNING PROTOCOL (STEPS) - {progress}%</span>
                        <div className="flex flex-col gap-2 mb-4">
                          {incident.steps.map(step => (
                            <div key={step.id} className="flex gap-3 items-start font-sans text-[13px] uppercase">
                              <button onClick={() => dispatch({ type: 'TOGGLE_INCIDENT_STEP', payload: { incidentId: incident.id, stepId: step.id }})} className="font-bold hover:text-[var(--stamp)]">
                                {step.done ? '[✕]' : '[ ]'}
                              </button>
                              <span className={step.done ? 'line-through opacity-50' : ''}>{step.text}</span>
                            </div>
                          ))}
                          {incident.steps.length === 0 && <span className="text-[11px] opacity-50 uppercase">[ NO STEPS DEFINED ]</span>}
                        </div>
                        
                        {!isPruned && (
                          <div className="flex gap-2">

            {sortedSyllabus.map((item, index) => {

    const TaskMatrix = () => {

          setTimerActive(false);

        return () => clearInterval(interval);
      }, [timerActive, timerLeft, toast]);

        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const MAX_DAILY_LOAD = 25; 
      const activeFocusTasks = state.tasks.filter(t => t.status === 'todo' && t.isToday);
      const currentLoad = activeFocusTasks.reduce((acc, t) => acc + t.weight, 0);
      const isOverloaded = currentLoad >= MAX_DAILY_LOAD;
      const backlogTasks = state.tasks.filter(t => t.status === 'todo' && !t.isToday);

          });
          toast(`TASK INITIALIZED ${forceBacklog ? '(FORCED TO BACKLOG)' : ''}`, forceBacklog ? 'warning' : 'info');

          toast('TASK DIRECTIVE CANNOT BE EMPTY', 'warning');

              </div>
            </div>
            <div className="flex flex-col items-end gap-3 shrink-0">
              <span className="tva-stamp" style={{ padding: '2px 8px', fontSize: '12px', transform: task.weight > 7 ? 'rotate(-6deg)' : 'rotate(-2deg)', color: task.weight > 7 ? 'var(--stamp)' : 'inherit', borderColor: task.weight > 7 ? 'var(--stamp)' : 'var(--ink)' }}>W:{task.weight}</span>

                  <button onClick={() => dispatch({ type: 'TOGGLE_TASK_TODAY', payload: task.id })} className="btn-ghost font-bold text-lg" disabled={timerActive} title={task.isToday ? "DEMOTE TO BACKLOG" : "PROMOTE TO FOCUS"}>
                    {task.isToday ? '↓' : '↑'}
                  </button>
                )}
                <button onClick={() => dispatch({ type: 'DELETE_TASK', payload: task.id })} disabled={timerActive} className="btn-ghost !text-[var(--rust)] font-bold text-lg">✕</button>
              </div>
            </div>
          </div>
        </div>
      );

        <div className="flex flex-col h-full bg-[var(--paper)] border-2 border-[var(--ink)] relative shadow-[4px_4px_0_0_var(--ink)]">
          <div className="section-head sticky top-0 z-10 bg-[var(--paper)] pt-4 px-4 border-b-2 border-[var(--ink)] shrink-0">

               <span className="label !mb-1 text-[10px]">CLEARANCE</span>
               <span className="font-display text-2xl text-[var(--stamp)] font-bold">{stats.clearancePoints} PTS</span>

          <div className="bg-[var(--crt-bg)] border-b-2 border-[var(--ink)] p-4 flex flex-col md:flex-row gap-4 md:items-center justify-between shadow-[inset_0_0_20px_rgba(0,0,0,0.5)]">
            <div className="flex flex-col">
              <span className="label !text-[var(--stamp)] opacity-70 flex items-center gap-2">
                 <div className={`w-2 h-2 rounded-full ${timerActive ? 'bg-[var(--stamp)] blink' : 'bg-gray-600'}`}></div>
                 CHRONO-MONITOR

              <span className="font-raster text-6xl md:text-7xl leading-none" style={{ color: 'var(--stamp)', textShadow: timerActive ? '0 0 15px var(--stamp)' : 'none' }}>

            <div className="flex flex-col gap-2 shrink-0">

                 {timerActive ? '[ PAUSE TIMELINE ]' : '[ AUTHORIZE FOCUS ]'}

               <button onClick={() => { setTimerActive(false); setTimerLeft(25 * 60); }} className="text-[var(--stamp)] opacity-60 hover:opacity-100 font-sans text-xs uppercase tracking-widest text-right">
                 [ RESET TIMELINE ]

          </div>

          <div className="flex border-b border-[var(--ink)]">
            <button onClick={() => !timerActive && setViewState('focus')} disabled={timerActive} className={`flex-1 py-2 font-sans text-[12px] uppercase tracking-widest font-bold transition-colors ${viewState === 'focus' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'} ${timerActive ? 'opacity-50 cursor-not-allowed' : ''}`}>FOCUS [{activeFocusTasks.length}]</button>
            <button onClick={() => !timerActive && setViewState('backlog')} disabled={timerActive} className={`flex-1 py-2 font-sans text-[12px] uppercase tracking-widest font-bold border-l-2 border-[var(--ink)] transition-colors ${viewState === 'backlog' ? 'bg-[var(--ink)] text-[var(--paper)]' : 'bg-transparent text-[var(--ink)] hover:bg-[var(--card)]'} ${timerActive ? 'opacity-50 cursor-not-allowed' : ''}`}>BACKLOG [{backlogTasks.length}]</button>
          </div>

          <div className="relative">
            {/* Overlay Lock for Chrono-Monitor */}
            {timerActive && (
              <div className="absolute inset-0 z-20 flex items-center justify-center bg-[var(--card)] bg-opacity-70 backdrop-blur-[2px]">
                 <div className="text-[var(--stamp)] font-display text-xl uppercase tracking-widest border-2 border-[var(--stamp)] px-4 py-2 bg-[var(--crt-bg)] shadow-[0_0_15px_var(--stamp)] animate-pulse">
                     MATRIX LOCKED. MAINTAIN FOCUS.
                 </div>
              </div>

            <div className="p-4 border-b border-[var(--ink)] border-dashed bg-[var(--card)] shrink-0">
              <div className="flex justify-between items-end mb-3">

                ))}

              <div className="flex flex-col gap-2 mt-4">

                 <div className="flex gap-2">
                   <input type="text" placeholder="REF (EPIC)..." className="input flex-1 min-w-0 !h-8 !text-[11px] !px-2 bg-[var(--paper)] border-dashed focus:border-solid focus:bg-[var(--card)]" value={newTask.epic} onChange={e => setNewTask({ ...newTask, epic: e.target.value })} onKeyDown={e => e.key === 'Enter' && handleAddTask()} />
                   <select className="input flex-1 min-w-0 !h-8 !text-[11px] !px-2 bg-[var(--paper)] border-dashed focus:border-solid focus:bg-[var(--card)] uppercase" value={newTask.syllabusId || ''} onChange={e => setNewTask({ ...newTask, syllabusId: e.target.value ? parseInt(e.target.value) : null })}>
                      <option value="">[ NO CONVERGENCE ]</option>

            {viewState === 'focus' ? (

                  activeFocusTasks.map(renderTask)

                {completedTasks.filter(t => t.isToday).length > 0 && (

                ) : (
                  backlogTasks.map(renderTask)
                )}

            )}

        </div>
      );

    const ResourceConsole = () => {
      const { state, dispatch } = useContext(MatrixContext);
      const toast = useContext(ToastContext);
      const [activeTab, setActiveTab] = useState('inventory'); 
      const [newInv, setNewInv] = useState({ name: '', category: 'Component', quantity: 1, minStock: 0, specs: '' });
      const [showInvForm, setShowInvForm] = useState(false);
      const [ttInputs, setTtInputs] = useState(2);
      const [ttOutputs, setTtOutputs] = useState([{ name: 'F', values: {} }]);
      const [ttName, setTtName] = useState('');
      const [newFormula, setNewFormula] = useState({ title: '', code: '' });
      const [selectedTtId, setSelectedTtId] = useState('');
      const [selectedTtOutIdx, setSelectedTtOutIdx] = useState(0);

      const updateInvQty = (id, current, delta) => dispatch({ type: 'UPDATE_INVENTORY', payload: { id, quantity: Math.max(0, current + delta) } });

      const handleAddInv = () => {
        if (newInv.name) {
          dispatch({ type: 'ADD_INVENTORY', payload: { id: Date.now(), ...newInv } });
          setNewInv({ name: '', category: 'Component', quantity: 1, minStock: 0, specs: '' });
          setShowInvForm(false);
          toast('COMPONENT RECORDED TO LEDGER', 'success');
        } else { toast('COMPONENT DESIGNATION REQUIRED', 'warning'); }
      };

      const generateTTMatrix = () => Array.from({length: Math.pow(2, ttInputs)}, (_, i) => i.toString(2).padStart(ttInputs, '0'));

      const toggleTtOutput = (outputIndex, rowKey) => {
        setTtOutputs(ttOutputs.map((out, idx) => idx !== outputIndex ? out : { ...out, values: { ...out.values, [rowKey]: (out.values[rowKey] || 0) === 0 ? 1 : 0 } }));
      };

      const addTtOutput = () => setTtOutputs([...ttOutputs, { name: `F${ttOutputs.length + 1}`, values: {} }]);

      const removeTtOutput = () => {
        if (ttOutputs.length > 1) {
          setTtOutputs(ttOutputs.slice(0, -1));
        }
      };

      const saveTruthTable = () => {
        if (!ttName) return toast('TABLE IDENTIFIER REQUIRED', 'warning');
        dispatch({ type: 'SAVE_TRUTH_TABLE', payload: { id: Date.now(), name: ttName, inputs: ttInputs, outputs: ttOutputs } });
        toast('TRUTH TABLE SECURED', 'success');
        setTtName('');
      };

      const generateBooleanEquation = (inputsCount, valuesMap) => {
        const inputs = ['A', 'B', 'C', 'D'].slice(0, inputsCount);
        const terms = [];
        for (let i = 0; i < Math.pow(2, inputsCount); i++) {
          const bin = i.toString(2).padStart(inputsCount, '0');
          if (valuesMap[bin] === 1) terms.push(`(${bin.split('').map((val, j) => val === '1' ? inputs[j] : `NOT ${inputs[j]}`).join(' AND ')})`);
        }
        return terms.length === 0 ? '0' : terms.length === Math.pow(2, inputsCount) ? '1' : terms.join(' OR ');
      };

              .blink { animation: blink 1s steps(2) infinite; }
              @keyframes spin-slow { to { transform: rotate(360deg); } }
              .spin-slow { animation: spin-slow 30s linear infinite; }
              @keyframes flow { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
              .animate-flow { animation: flow 4s linear infinite; }
              
              .scanlines::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, oklch(0 0 0 / 0.08) 0 1px, transparent 1px 3px); }

              footer { background: var(--ink); color: var(--paper); margin-top: 64px; border-top: 2px solid var(--ink); position: relative; z-index: 20; }

              footer .col h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; margin-bottom: 12px; }
              footer .col ul { display: flex; flex-direction: column; gap: 6px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.15em; }
              footer .bottom { border-top: 1px solid oklch(0.91 0.04 85 / 0.3); }
              footer .bottom .row { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 12px 24px; font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.7; }

              .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
              .custom-scrollbar::-webkit-scrollbar-track { background: var(--paper); border-left: 2px solid var(--ink); border-top: 2px solid var(--ink); }
              .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--ink); border: 2px solid var(--paper); }
            `}} />
